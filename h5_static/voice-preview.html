<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw - AI 语音助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background-color: #030613;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .mobile-app {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: radial-gradient(circle at top, #112658 0%, #030613 60%);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .nav-bar {
            padding: 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(3, 6, 19, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .display-area {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .text-output {
            font-size: 24px;
            line-height: 1.5;
            font-weight: 300;
            color: #94a3b8;
            text-align: center;
            min-height: 80px;
            transition: color 0.3s ease;
        }

        .text-output.active {
            color: #ffffff;
            font-weight: 500;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .action-cards {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            pointer-events: none;
        }

        .action-cards.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .action-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .action-card:active {
            transform: scale(0.97);
            background: rgba(59, 130, 246, 0.2);
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .card-text {
            flex: 1;
            font-size: 15px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .card-arrow { color: #60a5fa; }

        .control-area {
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-bottom: 30px;
        }

        .hint-text {
            position: absolute;
            top: 20px;
            font-size: 13px;
            color: #64748b;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        .mic-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-ripple {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            opacity: 0;
            pointer-events: none;
        }

        .is-recording .mic-ripple { animation: ripple-anim 1.5s infinite ease-out; }
        .is-recording .mic-ripple:nth-child(2) { animation-delay: 0.5s; }

        @keyframes ripple-anim {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            border: none;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4), inset 0 2px 10px rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: all 0.2s;
            user-select: none;
            touch-action: none;
        }

        .mic-btn svg {
            width: 32px;
            height: 32px;
            fill: #fff;
            transition: transform 0.2s;
        }

        .mic-btn:active,
        .is-recording .mic-btn {
            transform: scale(0.9);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.6), inset 0 5px 15px rgba(0,0,0,0.3);
        }

        .is-recording .mic-btn svg { transform: scale(1.1); }

        .sound-waves {
            position: absolute;
            top: -40px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .is-recording .sound-waves { opacity: 1; }

        .wave-bar {
            width: 4px;
            height: 20px;
            background: #60a5fa;
            border-radius: 2px;
        }

        .is-recording .wave-bar { animation: wave-anim 0.6s infinite alternate ease-in-out; }
        .wave-bar:nth-child(1) { animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { animation-delay: 0s; }
        .wave-bar:nth-child(4) { animation-delay: 0.4s; }
        .wave-bar:nth-child(5) { animation-delay: 0.2s; }

        @keyframes wave-anim {
            0% { transform: scaleY(0.5); background: #3b82f6; }
            100% { transform: scaleY(1.8); background: #93c5fd; }
        }
    </style>
</head>
<body>

    <div class="mobile-app">
        <div class="nav-bar">AI 语音助理</div>

        <div class="display-area">
            <div id="textOutput" class="text-output">等待您的指令...</div>

            <div id="actionCards" class="action-cards">
                <p style="font-size: 13px; color:#64748b; margin-bottom: 4px;">建议执行以下任务：</p>

                <div class="action-card" onclick="alert('执行任务：生成可视化数据报表')">
                    <div class="card-icon" style="background: rgba(16, 185, 129, 0.2); color:#10b981;">📊</div>
                    <div class="card-text">生成可视化数据报表</div>
                    <div class="card-arrow">→</div>
                </div>

                <div class="action-card" onclick="alert('执行任务：提取会议核心纪要')">
                    <div class="card-icon" style="background: rgba(139, 92, 246, 0.2); color:#8b5cf6;">📝</div>
                    <div class="card-text">提取核心纪要并总结</div>
                    <div class="card-arrow">→</div>
                </div>

                <div class="action-card" onclick="alert('执行任务：发起工作流')">
                    <div class="card-icon" style="background: rgba(245, 158, 11, 0.2); color:#f59e0b;">⚡</div>
                    <div class="card-text">发起数据分析工作流</div>
                    <div class="card-arrow">→</div>
                </div>
            </div>
        </div>

        <div class="control-area" id="controlArea">
            <div id="hintText" class="hint-text">按住说话</div>

            <div class="mic-wrapper">
                <div class="mic-ripple"></div>
                <div class="mic-ripple"></div>

                <div class="sound-waves">
                    <div class="wave-bar"></div><div class="wave-bar"></div>
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>

                <button id="micBtn" class="mic-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const controlArea = document.getElementById('controlArea');
        const textOutput = document.getElementById('textOutput');
        const actionCards = document.getElementById('actionCards');
        const hintText = document.getElementById('hintText');

        let isRecording = false;
        let simulateTimer = null;

        const mockVoiceText = "帮我分析一下第二季度的销售数据，并生成可视化报表。";

        const startRecording = (e) => {
            e.preventDefault();
            if (isRecording) return;
            isRecording = true;

            actionCards.classList.remove('show');
            textOutput.classList.remove('active');

            controlArea.classList.add('is-recording');
            hintText.style.opacity = '0';
            textOutput.innerText = "正在聆听...";
            textOutput.style.color = "#60a5fa";
        };

        const stopRecording = (e) => {
            e.preventDefault();
            if (!isRecording) return;
            isRecording = false;

            controlArea.classList.remove('is-recording');
            hintText.style.opacity = '1';
            textOutput.innerText = "正在识别...";
            textOutput.style.color = "#94a3b8";

            clearTimeout(simulateTimer);
            simulateTimer = setTimeout(() => {
                textOutput.innerText = `“${mockVoiceText}”`;
                textOutput.classList.add('active');

                setTimeout(() => {
                    actionCards.classList.add('show');
                }, 500);
            }, 1000);
        };

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', startRecording, { passive: false });

        window.addEventListener('mouseup', stopRecording);
        window.addEventListener('touchend', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
    </script>
</body>
</html>
