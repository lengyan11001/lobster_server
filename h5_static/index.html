<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>必火AI员工对话</title>
  <style>
    :root {
      --ink: #13213c;
      --muted: #6d7890;
      --line: #dfe6f2;
      --card: rgba(255, 255, 255, .86);
      --blue: #245cff;
      --blue2: #5f8bff;
      --green: #0f9f6e;
      --orange: #f08b2d;
      --danger: #d94646;
      --shadow: 0 24px 70px rgba(35, 58, 109, .18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "HarmonyOS Sans SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 20% 8%, rgba(255, 220, 185, .68), transparent 30rem),
        radial-gradient(circle at 82% 12%, rgba(107, 150, 255, .32), transparent 31rem),
        linear-gradient(135deg, #fff8ef 0%, #f5f8ff 50%, #eef4ff 100%);
    }
    .shell {
      width: min(1080px, calc(100vw - 28px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      padding: 18px 0;
    }
    .topbar, .panel {
      border: 1px solid rgba(255, 255, 255, .72);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 26px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      gap: 14px;
      position: relative;
      z-index: 40;
      overflow: visible;
    }
    .panel { position: relative; z-index: 1; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(145deg, #fff, #ffe5c7);
      box-shadow: inset 0 0 0 1px rgba(255, 177, 87, .36);
      font-size: 22px;
    }
    h1 { margin: 0; font-size: 19px; letter-spacing: .02em; }
    .subtitle { margin-top: 3px; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .userbox { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 13px; position: relative; }
    .top-menu { position: relative; }
    .menu-toggle {
      padding: 8px 13px;
      color: var(--ink);
      background: rgba(255, 255, 255, .72);
      box-shadow: inset 0 0 0 1px var(--line);
    }
    .menu-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 80;
      width: 174px;
      padding: 8px;
      border: 1px solid rgba(223, 230, 242, .95);
      border-radius: 16px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 18px 44px rgba(35, 58, 109, .18);
    }
    .menu-section-title {
      padding: 4px 8px 7px;
      color: var(--muted);
      font-size: 12px;
    }
    .menu-option {
      width: 100%;
      margin: 0;
      padding: 9px 10px;
      color: var(--ink);
      text-align: left;
      background: transparent;
      box-shadow: none;
      border-radius: 12px;
    }
    .menu-option.active {
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      box-shadow: 0 10px 22px rgba(36, 92, 255, .18);
    }
    .menu-option.danger { color: var(--danger); }
    button, input {
      font: inherit;
    }
    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 15px;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      box-shadow: 0 12px 30px rgba(36, 92, 255, .22);
      transition: transform .16s ease, opacity .16s ease;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button:not(:disabled):active { transform: scale(.98); }
    .ghost {
      color: var(--ink);
      background: rgba(255, 255, 255, .72);
      box-shadow: inset 0 0 0 1px var(--line);
    }
    .login {
      width: min(420px, 100%);
      margin: clamp(22px, 8vh, 86px) auto;
      padding: 24px;
    }
    .login h2 { margin: 0 0 8px; font-size: 25px; }
    .login p { margin: 0 0 22px; color: var(--muted); line-height: 1.7; }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    .field label { font-size: 13px; color: #46516a; }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 13px;
      color: var(--ink);
      background: rgba(255, 255, 255, .9);
      outline: none;
    }
    input:focus { border-color: rgba(36, 92, 255, .55); box-shadow: 0 0 0 4px rgba(36, 92, 255, .08); }
    .captcha-row { display: grid; grid-template-columns: 1fr 112px; gap: 10px; align-items: end; }
    .captcha-img {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      object-fit: cover;
      background: #fff;
      cursor: pointer;
    }
    .chat {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .chat-head {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      border-bottom: 1px solid rgba(223, 230, 242, .82);
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 5px rgba(240, 139, 45, .12);
    }
    .dot.online { background: var(--green); box-shadow-color: rgba(15, 159, 110, .14); }
    .messages {
      min-height: 360px;
      max-height: calc(100vh - 250px);
      overflow: auto;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .empty {
      margin: auto;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
      max-width: 520px;
    }
    .bubble {
      max-width: min(720px, 86%);
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      color: white;
      border-bottom-right-radius: 6px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      box-shadow: 0 14px 34px rgba(36, 92, 255, .22);
    }
    .bubble.bot {
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(223, 230, 242, .82);
    }
    .bubble.err { color: #8d2b2b; border-color: rgba(217, 70, 70, .32); background: rgba(255, 244, 244, .9); }
    .bubble a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .bubble.user a { color: #fff; }
    .media-preview {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .media-preview img,
    .media-preview video {
      width: min(220px, 100%);
      max-height: 260px;
      border-radius: 12px;
      border: 1px solid rgba(223, 230, 242, .9);
      background: #eef4ff;
      object-fit: cover;
    }
    .media-preview audio {
      width: min(280px, 100%);
    }
    .steps {
      margin-top: 8px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: #52607a;
    }
    .step {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(239, 244, 255, .92);
    }
    .quickbar {
      padding: 10px 14px 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .quickbar::-webkit-scrollbar { height: 0; }
    .quick-pill {
      flex: 0 0 auto;
      scroll-snap-align: start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 8px 12px;
      color: #263759;
      background: rgba(255, 255, 255, .78);
      border: 1px solid rgba(223, 230, 242, .92);
      box-shadow: 0 8px 22px rgba(35, 58, 109, .08);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .quick-pill strong {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
    }
    .quick-pill[data-tone="image"] strong { background: linear-gradient(135deg, #ffba5b, #f08b2d); }
    .quick-pill[data-tone="video"] strong { background: linear-gradient(135deg, #64a2ff, #416cff); }
    .quick-pill[data-tone="tvc"] strong { background: linear-gradient(135deg, #ff8ea5, #e94f70); }
    .quick-pill[data-tone="remix"] strong { background: linear-gradient(135deg, #b28cff, #7557e8); }
    .quick-pill[data-tone="publish"] strong { background: linear-gradient(135deg, #71d89d, #19a96f); }
    .quick-pill[data-tone="upload"] {
      color: #245cff;
      background: linear-gradient(135deg, rgba(238,244,255,.96), rgba(255,255,255,.9));
      border-color: rgba(36, 92, 255, .18);
    }
    .upload-preview {
      display: none;
      gap: 10px;
      padding: 10px 14px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .upload-preview.show { display: flex; }
    .upload-card {
      position: relative;
      flex: 0 0 auto;
      width: 94px;
      padding: 6px;
      border-radius: 18px;
      border: 1px solid rgba(223, 230, 242, .95);
      background: rgba(255, 255, 255, .84);
      box-shadow: 0 8px 24px rgba(35, 58, 109, .09);
    }
    .upload-card img {
      width: 100%;
      height: 70px;
      display: block;
      object-fit: cover;
      border-radius: 13px;
      background: #eef4ff;
    }
    .upload-status {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upload-card.failed .upload-status { color: var(--danger); }
    .upload-remove {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 22px;
      height: 22px;
      padding: 0;
      display: grid;
      place-items: center;
      color: white;
      background: rgba(19, 33, 60, .72);
      box-shadow: none;
      font-size: 15px;
    }
    .composer {
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-top: 1px solid rgba(223, 230, 242, .82);
    }
    .composer input { height: 48px; border-radius: 18px; }
    .hint { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.7; }
    .hidden { display: none !important; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      max-width: min(520px, calc(100vw - 32px));
      padding: 11px 14px;
      border-radius: 999px;
      color: white;
      background: rgba(19, 33, 60, .9);
      box-shadow: 0 18px 44px rgba(19, 33, 60, .28);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
    @media (max-width: 720px) {
      .shell { width: min(100vw - 16px, 720px); padding: 8px 0; gap: 10px; }
      .topbar {
        border-radius: 18px;
        padding: 10px 12px;
        align-items: center;
        flex-direction: row;
      }
      .logo {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        font-size: 18px;
      }
      h1 { font-size: 18px; }
      .subtitle { display: none; }
      .userbox {
        gap: 6px;
        font-size: 12px;
        flex: 0 0 auto;
      }
      .userbox .ghost {
        padding: 7px 11px;
      }
      .menu-panel {
        width: 164px;
        right: 0;
      }
      .chat-head {
        padding: 10px 12px;
        align-items: center;
        flex-direction: row;
        gap: 8px;
      }
      .status {
        justify-content: flex-end;
        text-align: right;
        gap: 6px;
        font-size: 12px;
        width: 100%;
      }
      .status .ghost {
        padding: 7px 11px;
      }
      .panel { border-radius: 20px; }
      .messages { max-height: calc(100vh - 226px); padding: 16px 12px; }
      .bubble { max-width: 94%; }
      .composer { grid-template-columns: 1fr; }
      .composer button { height: 46px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🦞</div>
        <div>
          <h1>必火AI员工对话</h1>
          <div class="subtitle">通过云端排队，把消息交给本地 AI 员工处理</div>
        </div>
      </div>
      <div class="userbox hidden" id="userbox">
        <span id="userEmail"></span>
        <div class="top-menu">
          <button class="menu-toggle" id="topMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">设置</button>
          <div class="menu-panel hidden" id="topMenuPanel">
            <button type="button" class="menu-option danger" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </div>
    </header>

    <section class="panel login" id="loginPanel">
      <h2>登录设备账号</h2>
      <p>不开放注册。请使用你在 AI 员工设备端已经注册过的账号，登录后即可远程发消息。</p>
      <form id="loginForm">
        <div class="field">
          <label for="account">账号 / 手机号</label>
          <input id="account" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="captcha-row">
          <div class="field" style="margin-bottom:0">
            <label for="captcha">验证码</label>
            <input id="captcha" name="captcha_answer" required />
          </div>
          <img class="captcha-img" id="captchaImg" alt="验证码" title="点击刷新" />
        </div>
        <input type="hidden" id="captchaId" name="captcha_id" />
        <button id="loginBtn" type="submit" style="width:100%;margin-top:18px">登录</button>
      </form>
      <div class="hint">提示：本地 online 需要保持启动并登录同一个账号，否则消息会停留在“等待设备领取”。</div>
    </section>

    <section class="panel chat hidden" id="chatPanel">
      <div class="chat-head">
        <div class="status">
          <span class="dot" id="onlineDot"></span>
          <span id="deviceText">正在检查设备在线状态...</span>
          <button class="ghost" id="refreshStatusBtn" type="button">刷新</button>
        </div>
      </div>
      <div class="messages" id="messages">
        <div class="empty" id="empty">
          发一条消息试试。H5 会把消息放到云端队列，本地 online 领取后再把处理进度和结果推回来。
        </div>
      </div>
      <div class="quickbar" id="quickbar" aria-label="快捷入口">
        <button type="button" class="quick-pill" data-tone="image" data-prompt="帮我生成一张图片，画面内容是："><strong>图</strong><span>生成图片</span></button>
        <button type="button" class="quick-pill" data-tone="video" data-prompt="帮我生成一个8秒宣传视频，画面内容是："><strong>视</strong><span>生成视频</span></button>
        <button type="button" class="quick-pill" data-tone="upload" data-image-video="1"><strong>传</strong><span>图生视频</span></button>
        <button type="button" class="quick-pill" data-tone="tvc" data-image-video="1" data-prompt="用爆款TVC生成一个视频"><strong>T</strong><span>爆款TVC</span></button>
        <button type="button" class="quick-pill" data-tone="publish" data-prompt="把某素材发布到 平台 账号"><strong>发</strong><span>发布</span></button>
      </div>
      <div class="upload-preview" id="uploadPreview"></div>
      <form class="composer" id="sendForm">
        <input type="file" id="imageInput" accept="image/*" multiple class="hidden" />
        <input id="messageInput" placeholder="输入消息，例如：帮我写一段产品短视频口播文案" autocomplete="off" />
        <button id="sendBtn" type="submit">发送</button>
      </form>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      token: localStorage.getItem("lobster_h5_token") || "",
      mode: "direct",
      user: null,
      streams: new Map(),
      pollers: new Map(),
      uploads: [],
    };
    const SHOW_INTERNAL_STEPS = false;
    const IMAGE_TO_VIDEO_PROMPT = "用这个图片，提示词：";

    function toast(text) {
      const el = $("toast");
      el.textContent = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2600);
    }

    function authHeaders() {
      return state.token ? { Authorization: `Bearer ${state.token}` } : {};
    }

    function setMessageTemplate(text) {
      const input = $("messageInput");
      if (!input) return;
      input.value = text || "";
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function renderUploads() {
      const box = $("uploadPreview");
      if (!box) return;
      box.innerHTML = "";
      box.classList.toggle("show", state.uploads.length > 0);
      state.uploads.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = `upload-card ${item.status === "failed" ? "failed" : ""}`;
        const img = document.createElement("img");
        img.src = item.previewUrl || item.url || "";
        img.alt = item.name || "上传图片";
        const rm = document.createElement("button");
        rm.type = "button";
        rm.className = "upload-remove";
        rm.textContent = "×";
        rm.addEventListener("click", () => {
          const old = state.uploads[idx];
          if (old && old.previewUrl) {
            try { URL.revokeObjectURL(old.previewUrl); } catch {}
          }
          state.uploads.splice(idx, 1);
          renderUploads();
        });
        const status = document.createElement("div");
        status.className = "upload-status";
        status.textContent = item.status === "uploading" ? "上传中..." : (item.status === "failed" ? (item.error || "上传失败") : "已上传");
        card.appendChild(img);
        card.appendChild(rm);
        card.appendChild(status);
        box.appendChild(card);
      });
    }

    async function uploadImageFile(file) {
      const item = {
        name: file.name || "图片",
        previewUrl: URL.createObjectURL(file),
        url: "",
        status: "uploading",
        error: "",
      };
      state.uploads.push(item);
      renderUploads();
      const fd = new FormData();
      fd.append("file", file);
      try {
        const resp = await fetch("/api/h5-chat/uploads", {
          method: "POST",
          headers: authHeaders(),
          body: fd,
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || "上传失败");
        item.url = data.url || "";
        item.status = item.url ? "ready" : "failed";
        if (!item.url) item.error = "缺少图片链接";
      } catch (err) {
        item.status = "failed";
        item.error = err.message || "上传失败";
      } finally {
        renderUploads();
      }
    }

    function hasUploadingImages() {
      return state.uploads.some((item) => item.status === "uploading");
    }

    function readyImageUrls() {
      return state.uploads.filter((item) => item.status === "ready" && item.url).map((item) => item.url);
    }

    function clearUploads() {
      state.uploads.forEach((item) => {
        if (item.previewUrl) {
          try { URL.revokeObjectURL(item.previewUrl); } catch {}
        }
      });
      state.uploads = [];
      renderUploads();
    }

    function buildMessageContent(raw) {
      const content = (raw || "").trim();
      const urls = readyImageUrls();
      if (!urls.length) return content;
      const imageBlock = [
        "",
        "【用户已上传图片】",
        ...urls.map((url, idx) => `${idx + 1}. ${url}`),
        "",
        "请在本轮任务中使用以上图片链接作为参考素材；如果用户要求图生视频，请直接基于图片生成视频，不要只写文案。",
      ].join("\n");
      return `${content}${imageBlock}`;
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}), ...authHeaders() };
      if (options.json) {
        headers["Content-Type"] = "application/json";
        options.body = JSON.stringify(options.json);
      }
      const resp = await fetch(path, { ...options, headers });
      const text = await resp.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { detail: text }; }
      if (!resp.ok) {
        throw new Error(data.detail || data.message || `HTTP ${resp.status}`);
      }
      return data;
    }

    async function refreshCaptcha() {
      const data = await fetch("/auth/captcha").then((r) => r.json());
      $("captchaId").value = data.captcha_id || "";
      $("captchaImg").src = data.image || "";
      $("captcha").value = "";
    }

    async function loadMe() {
      if (!state.token) return false;
      try {
        state.user = await api("/auth/me");
        $("userEmail").textContent = state.user.email || "已登录";
        $("loginPanel").classList.add("hidden");
        $("chatPanel").classList.remove("hidden");
        $("userbox").classList.remove("hidden");
        setMode();
        await loadHistory();
        await refreshDeviceStatus();
        return true;
      } catch (err) {
        localStorage.removeItem("lobster_h5_token");
        state.token = "";
        return false;
      }
    }

    function setMode() {
      state.mode = "direct";
      localStorage.setItem("lobster_h5_mode", state.mode);
      document.querySelectorAll("[data-mode-option]").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.modeOption === state.mode);
      });
    }

    function closeTopMenu() {
      const panel = $("topMenuPanel");
      const btn = $("topMenuBtn");
      if (panel) panel.classList.add("hidden");
      if (btn) btn.setAttribute("aria-expanded", "false");
    }

    function toggleTopMenu() {
      const panel = $("topMenuPanel");
      const btn = $("topMenuBtn");
      if (!panel || !btn) return;
      const opening = panel.classList.contains("hidden");
      panel.classList.toggle("hidden", !opening);
      btn.setAttribute("aria-expanded", opening ? "true" : "false");
    }

    function clearEmpty() {
      $("empty")?.classList.add("hidden");
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeMarkdownLinks(text) {
      return String(text || "")
        .replace(/`(https?:\/\/[^`\s]+)`/g, "$1")
        .replace(/\[([^\]\n]{1,120})\]\s*\n\s*\((https?:\/\/[^\s)]+)\)/g, "[$1]($2)");
    }

    function linkAnchor(url, label) {
      if (!/^https?:\/\//i.test(url || "")) return escapeHtml(label || url || "");
      return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label || url)}</a>`;
    }

    function linkifyText(text) {
      let value = normalizeMarkdownLinks(text);
      const links = [];
      function stash(anchor) {
        const token = `LOBSTERH5LINK${links.length}TOKEN`;
        links.push({ token, anchor });
        return token;
      }
      value = value.replace(/\[([^\]\n]{1,120})\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => stash(linkAnchor(url, label)));
      value = value.replace(/https?:\/\/[^\s<>"'`]+/g, (raw) => {
        let url = raw;
        let suffix = "";
        while (/[)\].,!?，。！？、；：]$/.test(url)) {
          suffix = url.slice(-1) + suffix;
          url = url.slice(0, -1);
        }
        return stash(linkAnchor(url, url)) + suffix;
      });
      let html = escapeHtml(value);
      for (const item of links) {
        html = html.replaceAll(item.token, item.anchor);
      }
      return html;
    }

    function ensureBubbleTextElement(bubble) {
      if (!bubble) return null;
      if (bubble._textEl && bubble._textEl.isConnected) return bubble._textEl;
      const textEl = document.createElement("span");
      textEl.className = "bubble-text";
      if (bubble.firstChild && bubble.firstChild.nodeType === Node.TEXT_NODE) {
        bubble._rawText = bubble.firstChild.nodeValue || bubble._rawText || "";
        bubble.removeChild(bubble.firstChild);
      }
      bubble.insertBefore(textEl, bubble.firstChild || null);
      bubble._textEl = textEl;
      return textEl;
    }

    function renderBubbleText(bubble) {
      const textEl = ensureBubbleTextElement(bubble);
      if (!textEl) return;
      textEl.innerHTML = linkifyText(bubble._rawText || "");
    }

    function collectMediaUrls(payload) {
      const out = [];
      const seen = new Set();
      function add(value) {
        if (Array.isArray(value)) {
          value.forEach(add);
          return;
        }
        if (value && typeof value === "object") {
          Object.values(value).forEach(add);
          return;
        }
        const text = String(value || "");
        const matches = text.match(/https?:\/\/[^\s<>"'`]+/gi) || [];
        matches.forEach((raw) => {
          let url = raw;
          while (/[)\].,!?，。！？、；：]$/.test(url)) url = url.slice(0, -1);
          if (!url || seen.has(url)) return;
          seen.add(url);
          out.push(url);
        });
      }
      add(payload);
      return out.slice(0, 6);
    }

    function renderMediaPreviews(bubble, urls) {
      if (!bubble || !urls || !urls.length) return;
      let box = bubble._mediaEl;
      if (!box || !box.isConnected) {
        box = document.createElement("div");
        box.className = "media-preview";
        bubble.appendChild(box);
        bubble._mediaEl = box;
      }
      box.innerHTML = "";
      urls.forEach((url) => {
        const low = url.toLowerCase();
        let el;
        if (/\.(mp4|webm|mov)(\?|#|$)/.test(low)) {
          el = document.createElement("video");
          el.src = url;
          el.controls = true;
          el.playsInline = true;
        } else if (/\.(mp3|wav|m4a|aac|ogg)(\?|#|$)/.test(low)) {
          el = document.createElement("audio");
          el.src = url;
          el.controls = true;
        } else if (/\.(png|jpe?g|webp|gif)(\?|#|$)/.test(low)) {
          const a = document.createElement("a");
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          el = document.createElement("img");
          el.src = url;
          el.alt = "生成素材预览";
          a.appendChild(el);
          box.appendChild(a);
          return;
        } else {
          el = document.createElement("a");
          el.href = url;
          el.target = "_blank";
          el.rel = "noopener noreferrer";
          el.textContent = "打开预览";
        }
        box.appendChild(el);
      });
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function addBubble(role, text) {
      clearEmpty();
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      el._rawText = text || "";
      const textEl = document.createElement("span");
      textEl.className = "bubble-text";
      el._textEl = textEl;
      el.appendChild(textEl);
      renderBubbleText(el);
      if (role === "bot") {
        const steps = document.createElement("div");
        steps.className = "steps";
        el.appendChild(steps);
        el._steps = steps;
      }
      $("messages").appendChild(el);
      $("messages").scrollTop = $("messages").scrollHeight;
      return el;
    }

    function addStep(bubble, text) {
      if (!SHOW_INTERNAL_STEPS) return;
      if (!bubble || !bubble._steps || !text) return;
      const s = document.createElement("span");
      s.className = "step";
      s.textContent = text;
      bubble._steps.appendChild(s);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function bubbleTextNode(bubble) {
      if (!bubble) return null;
      ensureBubbleTextElement(bubble);
      return {
        get nodeValue() { return bubble._rawText || ""; },
        set nodeValue(value) {
          bubble._rawText = value || "";
          renderBubbleText(bubble);
        }
      };
    }

    function setBubbleText(bubble, text) {
      if (!bubble) return;
      bubble._rawText = text || "";
      renderBubbleText(bubble);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function appendBubbleText(bubble, text) {
      if (!text) return;
      if (!bubble) return;
      bubble._rawText = (bubble._rawText || "") + text;
      renderBubbleText(bubble);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function eventLabel(ev) {
      const p = ev.payload || {};
      if (!SHOW_INTERNAL_STEPS) return "";
      if (ev.type === "queued") return "已进入云端队列";
      if (ev.type === "claimed") return "本地设备已领取";
      if (ev.type === "thinking") return p.text || "正在处理";
      if (ev.type === "tool_start") return p.name ? `调用能力：${p.name}` : "调用能力";
      if (ev.type === "tool_end") return p.name ? `能力完成：${p.name}` : "能力完成";
      if (ev.type === "progress") return p.text || p.message || "处理中";
      if (ev.type === "delta") return "";
      return "";
    }

    function handleEvent(ev, bubble, messageId) {
      if (!ev || !bubble) return;
      const label = eventLabel(ev);
      if (label) addStep(bubble, label);
      if (ev.type === "delta" && ev.payload && ev.payload.text) {
        appendBubbleText(bubble, ev.payload.text);
      }
      renderMediaPreviews(bubble, collectMediaUrls(ev.payload || {}));
      if (ev.type === "final") {
        const reply = (ev.payload && (ev.payload.reply_text || ev.payload.text)) || "处理完成。";
        setBubbleText(bubble, reply);
        renderMediaPreviews(bubble, collectMediaUrls(ev.payload || {}));
        closeStream(messageId);
      }
      if (ev.type === "error") {
        bubble.classList.add("err");
        setBubbleText(bubble, (ev.payload && (ev.payload.error || ev.payload.detail)) || "处理失败");
        closeStream(messageId);
      }
    }

    function closeStream(messageId) {
      const es = state.streams.get(messageId);
      if (es) es.close();
      state.streams.delete(messageId);
      const poll = state.pollers.get(messageId);
      if (poll) clearInterval(poll);
      state.pollers.delete(messageId);
    }

    function startPolling(messageId, bubble, lastEventId = 0) {
      if (state.pollers.has(messageId)) return;
      let last = lastEventId;
      const timer = setInterval(async () => {
        try {
          const data = await api(`/api/h5-chat/messages/${messageId}?after_event_id=${last}`);
          for (const ev of data.events || []) {
            last = Math.max(last, ev.id || 0);
            handleEvent(ev, bubble, messageId);
          }
          if (data.message && ["completed", "failed", "cancelled"].includes(data.message.status)) {
            if (data.message.status === "completed" && data.message.reply_text) {
              setBubbleText(bubble, data.message.reply_text);
            }
            if (data.message.status === "failed") {
              bubble.classList.add("err");
              setBubbleText(bubble, data.message.error || "处理失败");
            }
            closeStream(messageId);
          }
        } catch (err) {
          bubble.classList.add("err");
          setBubbleText(bubble, err.message || "查询失败");
          closeStream(messageId);
        }
      }, 1400);
      state.pollers.set(messageId, timer);
    }

    function startSse(messageId, bubble) {
      if (!window.EventSource) {
        startPolling(messageId, bubble, 0);
        return;
      }
      let last = 0;
      const url = `/api/h5-chat/messages/${messageId}/events?token=${encodeURIComponent(state.token)}`;
      const es = new EventSource(url);
      state.streams.set(messageId, es);
      const types = ["queued", "claimed", "thinking", "progress", "tool_start", "tool_end", "delta", "final", "error"];
      types.forEach((type) => {
        es.addEventListener(type, (evt) => {
          try {
            const ev = JSON.parse(evt.data || "{}");
            last = Math.max(last, ev.id || 0);
            handleEvent(ev, bubble, messageId);
          } catch (err) {
            console.warn("Bad SSE event", err);
          }
        });
      });
      es.onerror = () => {
        es.close();
        state.streams.delete(messageId);
        startPolling(messageId, bubble, last);
      };
    }

    function clearRenderedMessages() {
      $("messages").querySelectorAll(".bubble").forEach((el) => el.remove());
      const empty = $("empty");
      if (empty) empty.classList.remove("hidden");
    }

    function renderHistoryItem(item) {
      const msg = (item && item.message) || {};
      if (!msg.id) return;
      const events = Array.isArray(item.events) ? item.events : [];
      const isFinal = ["completed", "failed", "cancelled"].includes(msg.status);
      const hasDelta = events.some((ev) => ev && ev.type === "delta");
      addBubble("user", msg.content || "");
      let initialText = "已恢复，等待本地设备处理...";
      if (msg.status === "completed") initialText = msg.reply_text || "处理完成。";
      if (msg.status === "failed") initialText = msg.error || "处理失败";
      if (!isFinal && hasDelta) initialText = "";
      const bot = addBubble("bot", initialText);
      if (msg.status === "failed") bot.classList.add("err");
      let finalPayload = null;
      let lastEventId = 0;
      for (const ev of events) {
        lastEventId = Math.max(lastEventId, ev.id || 0);
        if (ev && ev.type === "final") finalPayload = ev.payload || null;
        handleEvent(ev, bot, msg.id);
      }
      if (msg.status === "completed" && msg.reply_text) setBubbleText(bot, msg.reply_text);
      if (finalPayload) renderMediaPreviews(bot, collectMediaUrls(finalPayload));
      if (msg.status === "failed") {
        bot.classList.add("err");
        setBubbleText(bot, msg.error || "处理失败");
      }
      if (!isFinal) {
        if (!bubbleTextNode(bot)?.nodeValue) setBubbleText(bot, "已恢复，等待本地设备处理...");
        startSse(msg.id, bot);
      }
    }

    async function loadHistory() {
      if (!state.token) return;
      try {
        const data = await api("/api/h5-chat/messages?limit=40");
        const items = Array.isArray(data.messages) ? data.messages : [];
        if (!items.length) return;
        clearRenderedMessages();
        for (const item of items) renderHistoryItem(item);
      } catch (err) {
        console.warn("Load H5 history failed", err);
      }
    }

    async function refreshDeviceStatus() {
      if (!state.token) return;
      try {
        const data = await api("/api/h5-chat/devices/status");
        $("onlineDot").classList.toggle("online", !!data.online);
        const online = (data.devices || []).filter((d) => d.online).length;
        const total = (data.devices || []).length;
        $("deviceText").textContent = data.online
          ? `本地在线：${online}/${total || online} 台`
          : "未检测到本地 online，发送后会等待设备领取";
      } catch (err) {
        $("onlineDot").classList.remove("online");
        $("deviceText").textContent = "设备状态获取失败";
      }
    }

    $("captchaImg").addEventListener("click", refreshCaptcha);
    $("topMenuBtn").addEventListener("click", (evt) => {
      evt.stopPropagation();
      toggleTopMenu();
    });
    document.querySelectorAll("[data-mode-option]").forEach((btn) => {
      btn.addEventListener("click", () => {
        setMode();
        closeTopMenu();
      });
    });
    document.addEventListener("click", (evt) => {
      const menu = $("topMenuPanel");
      const btn = $("topMenuBtn");
      if (!menu || !btn) return;
      if (menu.contains(evt.target) || btn.contains(evt.target)) return;
      closeTopMenu();
    });
    $("refreshStatusBtn").addEventListener("click", refreshDeviceStatus);
    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("lobster_h5_token");
      state.token = "";
      location.reload();
    });
    $("quickbar").addEventListener("click", (evt) => {
      const btn = evt.target.closest("button");
      if (!btn) return;
      if (btn.dataset.imageVideo === "1") {
        setMessageTemplate(btn.dataset.prompt || IMAGE_TO_VIDEO_PROMPT);
        $("imageInput").click();
        return;
      }
      setMessageTemplate(btn.dataset.prompt || "");
    });
    $("imageInput").addEventListener("change", async () => {
      const files = Array.from($("imageInput").files || []);
      $("imageInput").value = "";
      if (!files.length) return;
      if (!state.token) {
        toast("请先登录后再上传图片");
        return;
      }
      for (const file of files) {
        if (!/^image\//i.test(file.type || "")) {
          toast("只能上传图片");
          continue;
        }
        uploadImageFile(file);
      }
    });

    $("loginForm").addEventListener("submit", async (evt) => {
      evt.preventDefault();
      $("loginBtn").disabled = true;
      try {
        const form = new FormData(evt.currentTarget);
        const resp = await fetch("/auth/login", { method: "POST", body: form });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || "登录失败");
        state.token = data.access_token;
        localStorage.setItem("lobster_h5_token", state.token);
        await loadMe();
      } catch (err) {
        toast(err.message || "登录失败");
        await refreshCaptcha();
      } finally {
        $("loginBtn").disabled = false;
      }
    });

    $("sendForm").addEventListener("submit", async (evt) => {
      evt.preventDefault();
      const input = $("messageInput");
      const content = input.value.trim();
      if (hasUploadingImages()) {
        toast("图片还在上传中，请稍等");
        return;
      }
      if (!content) return;
      input.value = "";
      $("sendBtn").disabled = true;
      const messageContent = buildMessageContent(content);
      addBubble("user", content);
      const bot = addBubble("bot", "已发送，等待本地设备处理...");
      try {
        const data = await api("/api/h5-chat/messages", {
          method: "POST",
          json: { content: messageContent, mode: "direct" },
        });
        const msg = data.message || {};
        if (msg.id) startSse(msg.id, bot);
        clearUploads();
        await refreshDeviceStatus();
      } catch (err) {
        bot.classList.add("err");
        bot.childNodes[0].nodeValue = err.message || "发送失败";
      } finally {
        $("sendBtn").disabled = false;
        input.focus();
      }
    });

    (async function init() {
      setMode();
      const ok = await loadMe();
      if (!ok) {
        $("loginPanel").classList.remove("hidden");
        $("chatPanel").classList.add("hidden");
        $("userbox").classList.add("hidden");
        await refreshCaptcha();
      }
      setInterval(refreshDeviceStatus, 7000);
    })();
  </script>
</body>
</html>
