<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>必火AI员工</title>
  <style>
    :root {
      --ink: #102036;
      --muted: #6c7689;
      --line: #dfe6f2;
      --panel: rgba(255, 255, 255, .9);
      --blue: #245cff;
      --cyan: #13b7d8;
      --green: #13a873;
      --orange: #f08b2d;
      --red: #d94646;
      --dark: #111c32;
      --shadow: 0 18px 52px rgba(29, 54, 105, .16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "HarmonyOS Sans SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(120deg, rgba(36, 92, 255, .08) 0 1px, transparent 1px 96px),
        linear-gradient(210deg, rgba(19, 183, 216, .09) 0 1px, transparent 1px 104px),
        linear-gradient(135deg, #f8fbff 0%, #eef4ff 48%, #fff8ef 100%);
    }
    button, input, select { font: inherit; }
    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 10px 15px;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), #6d8dff);
      box-shadow: 0 12px 28px rgba(36, 92, 255, .2);
      transition: transform .16s ease, opacity .16s ease;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button:not(:disabled):active { transform: scale(.98); }
    input, select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, .94);
      outline: none;
    }
    input:focus, select:focus { border-color: rgba(36, 92, 255, .55); box-shadow: 0 0 0 4px rgba(36, 92, 255, .08); }
    .hidden { display: none !important; }
    .shell {
      width: min(980px, calc(100vw - 24px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px 0 88px;
    }
    .topbar, .panel {
      border: 1px solid rgba(255, 255, 255, .74);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 24px;
    }
    .topbar {
      position: sticky;
      top: 10px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .logo {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .logo img {
      width: 32px;
      height: 32px;
      display: block;
      object-fit: contain;
    }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
    .subtitle { margin-top: 2px; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .userbox { display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 13px; }
    .avatar-mini {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
    }
    .ghost {
      color: var(--ink);
      background: rgba(255, 255, 255, .74);
      box-shadow: inset 0 0 0 1px var(--line);
    }
    .danger { color: var(--red); background: rgba(255,255,255,.82); box-shadow: inset 0 0 0 1px rgba(217,70,70,.25); }
    .view { display: none; }
    .view.active { display: block; }
    .login {
      width: min(430px, 100%);
      margin: clamp(28px, 8vh, 90px) auto;
      padding: 24px;
    }
    .login h2 { margin: 0 0 8px; font-size: 24px; }
    .login p, .hint { color: var(--muted); line-height: 1.7; font-size: 13px; }
    .field { display: grid; gap: 7px; margin-bottom: 13px; }
    .field label { color: #46516a; font-size: 13px; }
    .captcha-row { display: grid; grid-template-columns: 1fr 112px; gap: 10px; align-items: end; }
    .captcha-img { height: 44px; border: 1px solid var(--line); border-radius: 14px; background: #fff; cursor: pointer; object-fit: cover; }

    .home-grid { display: grid; gap: 14px; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: 28px;
      color: #fff;
      background:
        linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgba(255,255,255,.08) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(135deg, #101a31 0%, #183f8f 54%, #10a7c8 100%);
      box-shadow: 0 24px 68px rgba(16, 45, 105, .28);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -18% -38% 28%;
      height: 180px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: rotate(-10deg);
    }
    .hero-content { position: relative; z-index: 1; display: grid; gap: 14px; }
    .hero-kicker { font-size: 12px; color: rgba(255,255,255,.72); }
    .hero-title { margin: 0; max-width: 560px; font-size: clamp(24px, 6vw, 38px); line-height: 1.15; letter-spacing: 0; }
    .task-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
    }
    .task-card-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .task-card-title {
      font-size: 17px;
      font-weight: 800;
      color: #fff;
    }
    .task-toggle {
      min-width: 88px;
      min-height: 42px;
      background: #fff;
      color: var(--blue);
      box-shadow: 0 14px 30px rgba(0,0,0,.18);
    }
    .task-panel-body { display: grid; gap: 12px; }
    .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .seg button {
      min-height: 42px;
      color: rgba(255,255,255,.84);
      background: rgba(255,255,255,.1);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
      border-radius: 14px;
    }
    .seg button.active { color: #102036; background: #fff; box-shadow: 0 12px 26px rgba(0,0,0,.14); }
    .task-fields { display: grid; grid-template-columns: 1.2fr .85fr .85fr; gap: 10px; align-items: end; }
    .task-fields .field { margin: 0; }
    .task-fields label { color: rgba(255,255,255,.78); }
    .task-fields input, .task-fields select { background: rgba(255,255,255,.94); }
    .digital-fields { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
    .digital-fields .field { margin: 0; }
    .task-actions { display: flex; justify-content: flex-end; gap: 10px; }
    .hero-action { min-height: 44px; background: #fff; color: var(--blue); box-shadow: 0 14px 30px rgba(0,0,0,.18); }
    .section-title { display: flex; align-items: center; justify-content: space-between; margin: 8px 2px 10px; }
    .section-title h2 { margin: 0; font-size: 18px; }
    .quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .quick-card {
      min-height: 98px;
      display: grid;
      align-content: space-between;
      gap: 10px;
      padding: 13px;
      color: var(--ink);
      text-align: left;
      border-radius: 18px;
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.7);
    }
    .quick-card strong { font-size: 15px; }
    .quick-card span { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .quick-mark { width: 26px; height: 26px; border-radius: 10px; display: grid; place-items: center; color: #fff; background: linear-gradient(135deg, var(--blue), var(--cyan)); font-size: 13px; font-weight: 900; }

    .chat {
      min-height: calc(100vh - 126px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .chat-head { padding: 12px 16px; border-bottom: 1px solid rgba(223,230,242,.8); }
    .status { display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 13px; }
    .status-left { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 0 5px rgba(240,139,45,.12); }
    .dot.online { background: var(--green); box-shadow-color: rgba(19,168,115,.14); }
    .messages { min-height: 360px; max-height: calc(100vh - 260px); overflow: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 13px; }
    .empty { margin: auto; color: var(--muted); text-align: center; line-height: 1.8; max-width: 520px; }
    .bubble { max-width: min(720px, 88%); padding: 13px 15px; border-radius: 18px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
    .bubble.user { align-self: flex-end; color: #fff; border-bottom-right-radius: 6px; background: linear-gradient(135deg, var(--blue), #6d8dff); box-shadow: 0 14px 34px rgba(36,92,255,.22); }
    .bubble.bot { align-self: flex-start; border-bottom-left-radius: 6px; background: rgba(255,255,255,.95); border: 1px solid rgba(223,230,242,.86); }
    .bubble.err { color: #8d2b2b; border-color: rgba(217,70,70,.32); background: rgba(255,244,244,.94); }
    .bubble a { color: var(--blue); font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
    .bubble.user a { color: #fff; }
    .media-preview { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .media-item { width: min(220px, 100%); display: grid; gap: 6px; align-content: start; }
    .media-preview img, .media-preview video { width: min(220px, 100%); max-height: 260px; border-radius: 12px; border: 1px solid rgba(223,230,242,.9); background: #eef4ff; object-fit: cover; }
    .media-preview audio { width: min(280px, 100%); }
    .media-actions { display: flex; flex-wrap: wrap; gap: 8px; font-size: 13px; line-height: 1.3; }
    .media-actions a { padding: 4px 8px; border-radius: 999px; background: rgba(36,92,255,.08); text-decoration: none; }
    .steps { margin-top: 8px; display: none; flex-wrap: wrap; gap: 6px; font-size: 12px; color: #52607a; }
    .upload-preview { display: none; gap: 10px; padding: 10px 14px 0; overflow-x: auto; }
    .upload-preview.show { display: flex; }
    .upload-card { position: relative; flex: 0 0 auto; width: 94px; padding: 6px; border-radius: 18px; border: 1px solid rgba(223,230,242,.95); background: rgba(255,255,255,.84); box-shadow: 0 8px 24px rgba(35,58,109,.09); }
    .upload-card img { width: 100%; height: 70px; display: block; object-fit: cover; border-radius: 13px; background: #eef4ff; }
    .upload-status { margin-top: 5px; color: var(--muted); font-size: 11px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-card.failed .upload-status { color: var(--red); }
    .upload-remove { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; padding: 0; display: grid; place-items: center; color: #fff; background: rgba(19,33,60,.72); box-shadow: none; font-size: 15px; }
    .composer { padding: 12px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; border-top: 1px solid rgba(223,230,242,.82); }
    .composer-input { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; min-width: 0; }
    .composer textarea {
      min-height: 48px;
      max-height: 148px;
      padding-top: 13px;
      padding-bottom: 13px;
      border-radius: 18px;
      line-height: 1.45;
      resize: none;
      overflow-y: auto;
    }
    .composer.expanded { grid-template-columns: 1fr; }
    .composer.expanded .composer-input { grid-template-columns: 1fr; }
    .composer.expanded textarea { min-height: 180px; max-height: min(46vh, 360px); }
    .composer-toggle { width: 58px; height: 46px; padding: 0; justify-self: end; font-size: 13px; color: var(--blue); background: rgba(36,92,255,.08); box-shadow: none; }

    .profile-grid { display: grid; gap: 14px; }
    .profile-head { display: flex; align-items: center; gap: 14px; padding: 18px; }
    .profile-avatar { width: 62px; height: 62px; border-radius: 22px; display: grid; place-items: center; color: #fff; font-size: 24px; font-weight: 900; background: linear-gradient(135deg, var(--dark), var(--blue)); }
    .profile-head h2 { margin: 0 0 4px; font-size: 20px; }
    .settings { padding: 16px; display: grid; gap: 12px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px; border-radius: 16px; background: rgba(248,251,255,.9); border: 1px solid rgba(223,230,242,.8); }
    .route-switch { display: inline-grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px; border-radius: 999px; background: #eef4ff; }
    .route-switch button { padding: 7px 11px; color: var(--muted); background: transparent; box-shadow: none; }
    .route-switch button.active { color: #fff; background: var(--blue); }
    .route-switch button:disabled { opacity: .45; }
    .runs { padding: 16px; }
    .run-list { display: grid; gap: 10px; }
    .run-card { padding: 12px; border-radius: 16px; background: rgba(248,251,255,.92); border: 1px solid rgba(223,230,242,.86); }
    .run-top { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; }
    .run-title { margin-top: 5px; font-weight: 800; }
    .run-result { margin-top: 6px; color: #40506c; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .run-media { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .run-media-item { display: grid; gap: 5px; }
    .run-media-actions { display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; }
    .run-media video { width: 132px; height: 76px; object-fit: cover; border-radius: 10px; background: #111; }
    .run-media img { width: 76px; height: 76px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); }
    .task-list { display: grid; gap: 10px; }
    .task-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px; border-radius: 16px; background: rgba(248,251,255,.92); border: 1px solid rgba(223,230,242,.86); }
    .task-row-main { min-width: 0; }
    .task-row-title { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-row-meta { margin-top: 4px; color: var(--muted); font-size: 12px; }
    .task-row-actions { display: flex; gap: 8px; flex: 0 0 auto; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 90;
      width: min(520px, calc(100vw - 24px));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 8px;
      border-radius: 22px;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.74);
      box-shadow: 0 18px 52px rgba(29,54,105,.2);
      backdrop-filter: blur(18px);
    }
    .bottom-nav button { min-height: 44px; color: var(--muted); background: transparent; box-shadow: none; border-radius: 16px; }
    .bottom-nav button.active { color: #fff; background: linear-gradient(135deg, var(--blue), var(--cyan)); box-shadow: 0 10px 24px rgba(36,92,255,.2); }
    .toast { position: fixed; left: 50%; bottom: 76px; transform: translateX(-50%); max-width: min(520px, calc(100vw - 32px)); padding: 11px 14px; border-radius: 999px; color: #fff; background: rgba(19,33,60,.9); box-shadow: 0 18px 44px rgba(19,33,60,.28); opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 100; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
    @media (max-width: 760px) {
      .shell { width: min(100vw - 16px, 720px); padding-top: 8px; }
      .topbar { top: 8px; border-radius: 18px; }
      .subtitle { display: none; }
      .userbox span { display: none; }
      .hero { border-radius: 22px; padding: 15px; }
      .task-fields, .digital-fields { grid-template-columns: 1fr; }
      .messages { max-height: calc(100vh - 238px); min-height: 350px; }
      .bubble { max-width: 94%; }
      .composer { grid-template-columns: 1fr; }
      .composer-input { grid-template-columns: 1fr auto; }
      .composer.expanded textarea { min-height: 220px; max-height: 48vh; }
      .composer button { height: 46px; }
      .quick-card { min-height: 92px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo"><img src="/h5-static/bihu_32.png" width="32" height="32" alt=""></div>
        <div>
          <h1>必火AI员工</h1>
          <div class="subtitle">远程任务、消息和执行记录</div>
        </div>
      </div>
      <div class="userbox hidden" id="userbox">
        <div class="avatar-mini" id="avatarMini">AI</div>
        <span id="userEmail"></span>
      </div>
    </header>

    <section class="panel login" id="loginPanel">
      <h2>登录设备账号</h2>
      <p>请使用 AI 员工设备端账号登录。</p>
      <form id="loginForm">
        <div class="field">
          <label for="account">账号 / 手机号</label>
          <input id="account" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="captcha-row">
          <div class="field" style="margin-bottom:0">
            <label for="captcha">验证码</label>
            <input id="captcha" name="captcha_answer" required />
          </div>
          <img class="captcha-img" id="captchaImg" alt="验证码" title="点击刷新" />
        </div>
        <input type="hidden" id="captchaId" name="captcha_id" />
        <button id="loginBtn" type="submit" style="width:100%;margin-top:18px">登录</button>
      </form>
      <div class="hint">本地 online 需要保持启动并登录同一个账号。</div>
    </section>

    <div id="appPanel" class="hidden">
      <section class="view active" id="homeView">
        <div class="home-grid">
          <div class="hero">
            <div class="hero-content">
              <div>
                <div class="hero-kicker">SCHEDULED ENGINE</div>
                <h2 class="hero-title">把记忆变成按时交付的内容资产</h2>
              </div>
              <div class="task-card">
                <div class="task-card-summary">
                  <div class="task-card-title">定时任务</div>
                  <button class="task-toggle" type="button" id="toggleTaskPanelBtn">开始</button>
                </div>
                <div class="task-panel-body hidden" id="taskPanelBody">
                  <div class="seg" id="taskAbilitySeg">
                    <button type="button" class="active" data-task-ability="goal.video.pipeline">创意成片</button>
                    <button type="button" data-task-ability="hifly.video.create_by_tts">必火数字人</button>
                  </div>
                  <div class="task-fields">
                    <div class="field">
                      <label for="taskTitle">任务名称</label>
                      <input id="taskTitle" placeholder="例如：每天生成一条宣传视频文案" />
                    </div>
                    <div class="field">
                      <label for="taskScheduleType">执行方式</label>
                      <select id="taskScheduleType">
                        <option value="once">一次性</option>
                        <option value="interval">循环执行</option>
                      </select>
                    </div>
                    <div class="field">
                      <label for="taskIntervalMinutes">间隔分钟</label>
                      <input id="taskIntervalMinutes" type="number" min="1" value="60" />
                    </div>
                  </div>
                  <div class="digital-fields hidden" id="digitalFields">
                    <div class="field">
                      <label for="taskAvatar">数字人</label>
                      <select id="taskAvatar"><option value="">加载中...</option></select>
                    </div>
                    <div class="field">
                      <label for="taskVoice">声音</label>
                      <select id="taskVoice"><option value="">加载中...</option></select>
                    </div>
                    <button class="ghost" type="button" id="autoPickDigitalBtn">自动</button>
                  </div>
                  <div class="task-actions">
                    <button class="hero-action" type="button" id="createTaskBtn">下发任务</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="section-title">
              <h2>快捷消息</h2>
              <button class="ghost" type="button" data-tab-target="messages">打开消息</button>
            </div>
            <div class="quick-grid" id="homeQuickGrid">
              <button class="quick-card" type="button" data-tone="image" data-prompt="帮我生成一张图片，画面内容是："><div class="quick-mark">图</div><strong>生成图片</strong><span>跳转消息并填入图片生成指令</span></button>
              <button class="quick-card" type="button" data-tone="video" data-prompt="帮我生成一个8秒宣传视频，画面内容是："><div class="quick-mark">视</div><strong>生成视频</strong><span>跳转消息并填入视频生成指令</span></button>
              <button class="quick-card" type="button" data-tone="upload" data-image-video="1" data-prompt="用这个图片，提示词："><div class="quick-mark">传</div><strong>图生视频</strong><span>先上传图片，再进入消息继续补充</span></button>
              <button class="quick-card" type="button" data-tone="tvc" data-prompt="用爆款TVC生成一个视频"><div class="quick-mark">T</div><strong>爆款TVC</strong><span>填入爆款复刻视频指令</span></button>
              <button class="quick-card" type="button" data-tone="publish" data-prompt="把某素材发布到 平台 账号"><div class="quick-mark">发</div><strong>发布素材</strong><span>填入发布任务消息</span></button>
              <button class="quick-card" type="button" data-tone="copy" data-prompt="根据我的记忆，写一条50字以内的朋友圈文案"><div class="quick-mark">文</div><strong>朋友圈文案</strong><span>快速生成短文案</span></button>
            </div>
          </div>
        </div>
      </section>

      <section class="view" id="messagesView">
        <div class="panel chat">
          <div class="chat-head">
            <div class="status">
              <div class="status-left">
                <span class="dot" id="onlineDot"></span>
                <span id="deviceText">正在检查设备在线状态...</span>
              </div>
              <button class="ghost" id="refreshStatusBtn" type="button">刷新</button>
            </div>
          </div>
          <div class="messages" id="messages">
            <div class="empty" id="empty">发一条消息试试。</div>
          </div>
          <div class="upload-preview" id="uploadPreview"></div>
          <form class="composer" id="sendForm">
            <input type="file" id="imageInput" accept="image/*" multiple class="hidden" />
            <div class="composer-input">
              <textarea id="messageInput" rows="1" placeholder="输入消息，例如：帮我写一段产品短视频口播文案" autocomplete="off"></textarea>
              <button class="composer-toggle" id="toggleComposerBtn" type="button" aria-expanded="false">展开</button>
            </div>
            <button id="sendBtn" type="submit">发送</button>
          </form>
        </div>
      </section>

      <section class="view" id="profileView">
        <div class="profile-grid">
          <div class="panel profile-head">
            <div class="profile-avatar" id="profileAvatar">AI</div>
            <div>
              <h2 id="profileName">已登录</h2>
              <div class="hint" id="profileDeviceText">设备状态检查中</div>
            </div>
          </div>
          <div class="panel settings">
            <div class="setting-row">
              <div>
                <strong>设置</strong>
                <div class="hint">消息和任务都走当前账号</div>
              </div>
              <button class="ghost" type="button" id="refreshProfileBtn">刷新</button>
            </div>
            <div class="setting-row">
              <div>
                <strong>路由切换</strong>
                <div class="hint">手机会话当前使用直连通道</div>
              </div>
              <div class="route-switch">
                <button type="button" class="active" data-route="direct">直连</button>
                <button type="button" disabled data-route="openclaw">OpenClaw</button>
              </div>
            </div>
            <button class="danger" type="button" id="logoutBtn">退出登录</button>
          </div>
          <div class="panel runs">
            <div class="section-title">
              <h2>定时任务</h2>
              <button class="ghost" type="button" id="refreshTasksBtn">刷新</button>
            </div>
            <div class="task-list" id="taskList"></div>
          </div>
          <div class="panel runs">
            <div class="section-title">
              <h2>执行记录</h2>
              <button class="ghost" type="button" id="refreshRunsBtn">刷新</button>
            </div>
            <div class="run-list" id="runList"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav hidden" id="bottomNav">
    <button type="button" class="active" data-tab-target="home">首页</button>
    <button type="button" data-tab-target="messages">消息</button>
    <button type="button" data-tab-target="profile">个人</button>
  </nav>
  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      token: localStorage.getItem("lobster_h5_token") || "",
      mode: "direct",
      user: null,
      streams: new Map(),
      pollers: new Map(),
      uploads: [],
      devices: [],
      taskAbility: "goal.video.pipeline",
      taskPanelOpen: false,
      hiflyLoaded: false,
      hiflyLoading: false,
      avatarRows: [],
      voiceRows: [],
    };
    const SHOW_INTERNAL_STEPS = false;
    const IMAGE_TO_VIDEO_PROMPT = "用这个图片，提示词：";

    function toast(text) {
      const el = $("toast");
      el.textContent = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2600);
    }

    function authHeaders(extra = {}) {
      return state.token ? { Authorization: `Bearer ${state.token}`, ...extra } : { ...extra };
    }

    function api(path, options = {}) {
      const headers = { ...(options.headers || {}), ...authHeaders() };
      if (options.json) {
        headers["Content-Type"] = "application/json";
        options.body = JSON.stringify(options.json);
      }
      return fetch(path, { ...options, headers }).then(async (resp) => {
        const text = await resp.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch { data = { detail: text }; }
        if (!resp.ok) throw new Error(data.detail || data.message || `HTTP ${resp.status}`);
        return data;
      });
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function firstChar(text) {
      const s = String(text || "AI").trim();
      return (s[0] || "A").toUpperCase();
    }

    function fmtTime(value) {
      if (!value) return "-";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value).slice(0, 16);
      return d.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function statusText(status) {
      return {
        pending: "待执行",
        processing: "执行中",
        completed: "完成",
        failed: "失败",
        cancelled: "已取消",
        active: "启用",
        paused: "暂停",
      }[status] || status || "-";
    }

    function capabilityName(capabilityId) {
      return {
        "goal.video.pipeline": "创意成片",
        "hifly.video.create_by_tts": "必火数字人",
      }[capabilityId] || capabilityId || "定时任务";
    }

    function taskCapabilityId(row) {
      const payload = row && row.payload && typeof row.payload === "object" ? row.payload : {};
      return String(payload.capability_id || "");
    }

    function currentInstallationId() {
      const online = state.devices.find((d) => d.online && d.installation_id);
      const any = state.devices.find((d) => d.installation_id);
      return (online || any || {}).installation_id || "";
    }

    function scrollMessagesToBottom() {
      const messages = $("messages");
      if (messages) messages.scrollTop = messages.scrollHeight;
      const composer = $("sendForm");
      if (composer && typeof composer.scrollIntoView === "function") {
        composer.scrollIntoView({ block: "end", behavior: "smooth" });
      }
    }

    function focusMessageInput() {
      const input = $("messageInput");
      if (!input) return;
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function autosizeMessageInput() {
      const input = $("messageInput");
      if (!input) return;
      input.style.height = "auto";
      const expanded = $("sendForm")?.classList.contains("expanded");
      const limit = expanded ? Math.min(window.innerHeight * 0.48, 360) : 148;
      const next = Math.min(input.scrollHeight, limit);
      input.style.height = `${Math.max(48, next)}px`;
    }

    function setComposerExpanded(expanded) {
      const form = $("sendForm");
      const btn = $("toggleComposerBtn");
      if (!form || !btn) return;
      form.classList.toggle("expanded", !!expanded);
      btn.textContent = expanded ? "收起" : "展开";
      btn.setAttribute("aria-expanded", expanded ? "true" : "false");
      autosizeMessageInput();
      focusMessageInput();
      setTimeout(scrollMessagesToBottom, 60);
    }

    function switchTab(tab) {
      const key = tab || "home";
      document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === `${key}View`));
      document.querySelectorAll("[data-tab-target]").forEach((btn) => btn.classList.toggle("active", btn.dataset.tabTarget === key));
      if (key === "profile") Promise.all([loadTasks(), loadRuns()]);
      if (key === "messages") setTimeout(() => {
        autosizeMessageInput();
        scrollMessagesToBottom();
        focusMessageInput();
      }, 80);
    }

    function setMessageTemplate(text) {
      const input = $("messageInput");
      if (!input) return;
      input.value = text || "";
      autosizeMessageInput();
      focusMessageInput();
      setTimeout(scrollMessagesToBottom, 80);
    }

    async function refreshCaptcha() {
      const data = await fetch("/auth/captcha").then((r) => r.json());
      $("captchaId").value = data.captcha_id || "";
      $("captchaImg").src = data.image || "";
      $("captcha").value = "";
    }

    async function loadMe() {
      if (!state.token) return false;
      try {
        state.user = await api("/auth/me");
        const name = state.user.email || "已登录";
        $("userEmail").textContent = name;
        $("profileName").textContent = name;
        $("avatarMini").textContent = firstChar(name);
        $("profileAvatar").textContent = firstChar(name);
        $("loginPanel").classList.add("hidden");
        $("appPanel").classList.remove("hidden");
        $("userbox").classList.remove("hidden");
        $("bottomNav").classList.remove("hidden");
        await Promise.all([loadHistory(), refreshDeviceStatus(), loadTasks(), loadRuns()]);
        return true;
      } catch (err) {
        localStorage.removeItem("lobster_h5_token");
        state.token = "";
        return false;
      }
    }

    async function refreshDeviceStatus() {
      if (!state.token) return;
      try {
        const data = await api("/api/h5-chat/devices/status");
        state.devices = Array.isArray(data.devices) ? data.devices : [];
        $("onlineDot").classList.toggle("online", !!data.online);
        const online = state.devices.filter((d) => d.online).length;
        const total = state.devices.length;
        const text = data.online ? `本地在线：${online}/${total || online} 台` : "未检测到本地 online";
        $("deviceText").textContent = text;
        $("profileDeviceText").textContent = text;
      } catch (err) {
        $("onlineDot").classList.remove("online");
        $("deviceText").textContent = "设备状态获取失败";
        $("profileDeviceText").textContent = "设备状态获取失败";
      }
    }

    function normalizeAvatarRows(...groups) {
      const out = [];
      const seen = new Set();
      groups.flat().forEach((row) => {
        const avatar = String((row && row.avatar) || "").trim();
        if (!avatar || seen.has(avatar)) return;
        seen.add(avatar);
        out.push({ avatar, title: row.title || avatar, section: row.section_label || row.section || "" });
      });
      return out;
    }

    function normalizeVoiceRows(...groups) {
      const out = [];
      const seen = new Set();
      groups.flat().forEach((row) => {
        const styles = Array.isArray(row && row.styles) && row.styles.length ? row.styles : [row];
        styles.forEach((style) => {
          const voice = String((style && style.voice) || (row && row.voice) || "").trim();
          if (!voice || seen.has(voice)) return;
          seen.add(voice);
          const base = row && row.title ? row.title : voice;
          const label = style && style.label && style.label !== "默认风格" ? `${base} - ${style.label}` : base;
          out.push({ voice, title: label, section: row.section_label || row.section || "" });
        });
      });
      return out;
    }

    function renderHiflyOptions() {
      const avatarSel = $("taskAvatar");
      const voiceSel = $("taskVoice");
      if (avatarSel) {
        avatarSel.innerHTML = state.avatarRows.length
          ? state.avatarRows.map((row) => `<option value="${escapeHtml(row.avatar)}">${escapeHtml(row.title)}</option>`).join("")
          : `<option value="">暂无可用数字人</option>`;
      }
      if (voiceSel) {
        voiceSel.innerHTML = state.voiceRows.length
          ? state.voiceRows.map((row) => `<option value="${escapeHtml(row.voice)}">${escapeHtml(row.title)}</option>`).join("")
          : `<option value="">暂无可用声音</option>`;
      }
    }

    async function loadHiflyLibraries() {
      if (state.hiflyLoaded || state.hiflyLoading) return;
      state.hiflyLoading = true;
      try {
        const [myAvatar, publicAvatar, myVoice, publicVoice] = await Promise.all([
          api("/api/hifly/my/avatar/list?page=1&size=100").catch(() => ({ items: [] })),
          api("/api/hifly/avatar/library", { method: "POST", json: { page: 1, size: 100, include_mine: true } }).catch(() => ({ public: [] })),
          api("/api/hifly/my/voice/list?page=1&size=100").catch(() => ({ items: [] })),
          api("/api/hifly/voice/library", { method: "POST", json: {} }).catch(() => ({ public: [] })),
        ]);
        state.avatarRows = normalizeAvatarRows(myAvatar.items || [], publicAvatar.public || []);
        state.voiceRows = normalizeVoiceRows(myVoice.items || [], publicVoice.public || []);
        state.hiflyLoaded = true;
        renderHiflyOptions();
      } catch (err) {
        toast(err.message || "数字人资源加载失败");
      } finally {
        state.hiflyLoading = false;
      }
    }

    function setTaskAbility(ability) {
      state.taskAbility = ability || "goal.video.pipeline";
      document.querySelectorAll("[data-task-ability]").forEach((btn) => btn.classList.toggle("active", btn.dataset.taskAbility === state.taskAbility));
      $("digitalFields").classList.toggle("hidden", state.taskAbility !== "hifly.video.create_by_tts");
      if (state.taskPanelOpen && state.taskAbility === "hifly.video.create_by_tts") loadHiflyLibraries();
    }

    function setTaskPanelOpen(open) {
      state.taskPanelOpen = !!open;
      $("taskPanelBody").classList.toggle("hidden", !state.taskPanelOpen);
      $("toggleTaskPanelBtn").textContent = state.taskPanelOpen ? "收起" : "开始";
      if (state.taskPanelOpen && state.taskAbility === "hifly.video.create_by_tts") loadHiflyLibraries();
    }

    function autoPickDigital() {
      if (state.avatarRows[0]) $("taskAvatar").value = state.avatarRows[0].avatar;
      if (state.voiceRows[0]) $("taskVoice").value = state.voiceRows[0].voice;
      loadHiflyLibraries();
    }

    async function createScheduledTask() {
      const btn = $("createTaskBtn");
      const installationId = currentInstallationId();
      if (!installationId) {
        toast("未检测到本地 online 设备");
        return;
      }
      let capPayload = {};
      if (state.taskAbility === "hifly.video.create_by_tts") {
        const avatar = $("taskAvatar").value;
        const voice = $("taskVoice").value;
        if (!avatar) throw new Error("请选择数字人");
        if (!voice) throw new Error("请选择声音");
        capPayload = { avatar, voice };
      }
      const interval = parseInt($("taskIntervalMinutes").value || "60", 10);
      const title = ($("taskTitle").value || "").trim() || (state.taskAbility === "hifly.video.create_by_tts" ? "必火数字人" : "创意成片");
      const body = {
        title,
        task_kind: "capability",
        content: `定时调用能力 ${state.taskAbility}`,
        payload: { capability_id: state.taskAbility, payload: capPayload },
        schedule_type: $("taskScheduleType").value || "once",
        interval_seconds: Math.max(60, (Number.isNaN(interval) ? 60 : interval) * 60),
        installation_ids: [installationId],
      };
      btn.disabled = true;
      try {
        await api("/api/scheduled-tasks/tasks", {
          method: "POST",
          json: body,
          headers: { "X-Installation-Id": installationId },
        });
        toast("任务已下发");
        setTaskPanelOpen(false);
        await Promise.all([loadTasks(), loadRuns()]);
      } catch (err) {
        toast(err.message || "下发失败");
      } finally {
        btn.disabled = false;
      }
    }

    async function loadTasks() {
      const box = $("taskList");
      if (!state.token || !box) return;
      box.innerHTML = `<div class="hint">加载中...</div>`;
      try {
        const data = await api("/api/scheduled-tasks/tasks?limit=50");
        const rows = Array.isArray(data.tasks) ? data.tasks : [];
        if (!rows.length) {
          box.innerHTML = `<div class="hint">暂无定时任务。</div>`;
          return;
        }
        box.innerHTML = rows.map((row) => {
          const interval = row.schedule_type === "interval" ? `每 ${Math.round((row.interval_seconds || 0) / 60)} 分钟` : "一次性";
          return `<div class="task-row">
            <div class="task-row-main">
              <div class="task-row-title">${escapeHtml(row.title || capabilityName(taskCapabilityId(row)))}</div>
              <div class="task-row-meta">${escapeHtml(capabilityName(taskCapabilityId(row)))} · ${escapeHtml(interval)} · ${escapeHtml(statusText(row.status))}</div>
            </div>
            <div class="task-row-actions">
              <button class="ghost" type="button" data-delete-task="${escapeHtml(row.id)}">删除</button>
            </div>
          </div>`;
        }).join("");
      } catch (err) {
        box.innerHTML = `<div class="hint">${escapeHtml(err.message || "定时任务加载失败")}</div>`;
      }
    }

    async function deleteTask(taskId, btn) {
      if (!taskId) return;
      if (!confirm("删除前会先停止任务，并取消未完成的执行记录。确认删除？")) return;
      const oldText = btn ? btn.textContent : "";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "删除中...";
      }
      try {
        await api(`/api/scheduled-tasks/tasks/${encodeURIComponent(taskId)}`, { method: "DELETE" });
        toast("已停止并删除任务");
        await Promise.all([loadTasks(), loadRuns()]);
      } catch (err) {
        toast(err.message || "删除失败");
        if (btn) {
          btn.disabled = false;
          btn.textContent = oldText || "删除";
        }
      }
    }

    function renderUploads() {
      const box = $("uploadPreview");
      if (!box) return;
      box.innerHTML = "";
      box.classList.toggle("show", state.uploads.length > 0);
      state.uploads.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = `upload-card ${item.status === "failed" ? "failed" : ""}`;
        const img = document.createElement("img");
        img.src = item.previewUrl || item.url || "";
        img.alt = item.name || "上传图片";
        const rm = document.createElement("button");
        rm.type = "button";
        rm.className = "upload-remove";
        rm.textContent = "x";
        rm.addEventListener("click", () => {
          const old = state.uploads[idx];
          if (old && old.previewUrl) {
            try { URL.revokeObjectURL(old.previewUrl); } catch {}
          }
          state.uploads.splice(idx, 1);
          renderUploads();
        });
        const status = document.createElement("div");
        status.className = "upload-status";
        status.textContent = item.status === "uploading" ? "上传中..." : (item.status === "failed" ? (item.error || "上传失败") : "已上传");
        card.appendChild(img);
        card.appendChild(rm);
        card.appendChild(status);
        box.appendChild(card);
      });
    }

    async function uploadImageFile(file) {
      const item = { name: file.name || "图片", previewUrl: URL.createObjectURL(file), url: "", status: "uploading", error: "" };
      state.uploads.push(item);
      renderUploads();
      const fd = new FormData();
      fd.append("file", file);
      try {
        const resp = await fetch("/api/h5-chat/uploads", { method: "POST", headers: authHeaders(), body: fd });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || "上传失败");
        item.url = data.url || "";
        item.status = item.url ? "ready" : "failed";
        if (!item.url) item.error = "缺少图片链接";
      } catch (err) {
        item.status = "failed";
        item.error = err.message || "上传失败";
      } finally {
        renderUploads();
      }
    }

    function hasUploadingImages() {
      return state.uploads.some((item) => item.status === "uploading");
    }

    function readyImageUrls() {
      return state.uploads.filter((item) => item.status === "ready" && item.url).map((item) => item.url);
    }

    function clearUploads() {
      state.uploads.forEach((item) => {
        if (item.previewUrl) {
          try { URL.revokeObjectURL(item.previewUrl); } catch {}
        }
      });
      state.uploads = [];
      renderUploads();
    }

    function buildMessageContent(raw) {
      const content = (raw || "").trim();
      const urls = readyImageUrls();
      if (!urls.length) return content;
      return `${content}\n\n【用户已上传图片】\n${urls.map((url, idx) => `${idx + 1}. ${url}`).join("\n")}\n\n请在本轮任务中使用以上图片链接作为参考素材；如果用户要求图生视频，请直接基于图片生成视频，不要只写文案。`;
    }

    function normalizeMarkdownLinks(text) {
      return String(text || "")
        .replace(/`(https?:\/\/[^`\s]+)`/g, "$1")
        .replace(/\[([^\]\n]{1,120})\]\s*\n\s*\((https?:\/\/[^\s)]+)\)/g, "[$1]($2)");
    }

    function linkAnchor(url, label) {
      if (!/^https?:\/\//i.test(url || "")) return escapeHtml(label || url || "");
      return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label || url)}</a>`;
    }

    function linkifyText(text) {
      let value = normalizeMarkdownLinks(text);
      const links = [];
      function stash(anchor) {
        const token = `LOBSTERH5LINK${links.length}TOKEN`;
        links.push({ token, anchor });
        return token;
      }
      value = value.replace(/\[([^\]\n]{1,120})\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => stash(linkAnchor(url, label)));
      value = value.replace(/https?:\/\/[^\s<>"'`]+/g, (raw) => {
        let url = raw;
        let suffix = "";
        while (/[)\].,!?，。！？、；：]$/.test(url)) {
          suffix = url.slice(-1) + suffix;
          url = url.slice(0, -1);
        }
        return stash(linkAnchor(url, url)) + suffix;
      });
      let html = escapeHtml(value);
      for (const item of links) html = html.replaceAll(item.token, item.anchor);
      return html;
    }

    function ensureBubbleTextElement(bubble) {
      if (!bubble) return null;
      if (bubble._textEl && bubble._textEl.isConnected) return bubble._textEl;
      const textEl = document.createElement("span");
      textEl.className = "bubble-text";
      if (bubble.firstChild && bubble.firstChild.nodeType === Node.TEXT_NODE) {
        bubble._rawText = bubble.firstChild.nodeValue || bubble._rawText || "";
        bubble.removeChild(bubble.firstChild);
      }
      bubble.insertBefore(textEl, bubble.firstChild || null);
      bubble._textEl = textEl;
      return textEl;
    }

    function renderBubbleText(bubble) {
      const textEl = ensureBubbleTextElement(bubble);
      if (!textEl) return;
      textEl.innerHTML = linkifyText(bubble._rawText || "");
    }

    function collectMediaUrls(payload) {
      const out = [];
      const seen = new Set();
      function add(value) {
        if (Array.isArray(value)) { value.forEach(add); return; }
        if (value && typeof value === "object") { Object.values(value).forEach(add); return; }
        const matches = String(value || "").match(/https?:\/\/[^\s<>"'`]+/gi) || [];
        matches.forEach((raw) => {
          let url = raw;
          while (/[)\].,!?，。！？、；：]$/.test(url)) url = url.slice(0, -1);
          if (!url || seen.has(url)) return;
          seen.add(url);
          out.push(url);
        });
      }
      const refs = payload && payload.result_refs && typeof payload.result_refs === "object" ? payload.result_refs : {};
      if (Array.isArray(payload && payload.media_urls) || Array.isArray(refs.urls)) {
        add(payload && payload.media_urls);
        add(refs.urls);
      } else {
        add(payload);
      }
      return out.slice(0, 6);
    }

    function filenameFromUrl(url, fallback) {
      try {
        const parsed = new URL(url);
        const name = decodeURIComponent(parsed.pathname.split("/").pop() || "");
        return name || fallback;
      } catch {
        const clean = String(url || "").split(/[?#]/)[0].split("/").pop() || "";
        return clean || fallback;
      }
    }

    function mediaActions(url, downloadLabel, fallbackName) {
      const actions = document.createElement("div");
      actions.className = "media-actions";
      const open = document.createElement("a");
      open.href = url;
      open.target = "_blank";
      open.rel = "noopener noreferrer";
      open.textContent = "打开";
      const download = document.createElement("a");
      download.href = url;
      download.target = "_blank";
      download.rel = "noopener noreferrer";
      download.download = filenameFromUrl(url, fallbackName);
      download.textContent = downloadLabel;
      actions.appendChild(open);
      actions.appendChild(download);
      return actions;
    }

    function mediaActionHtml(url, downloadLabel, fallbackName) {
      const safeUrl = escapeHtml(url);
      const filename = escapeHtml(filenameFromUrl(url, fallbackName));
      return `<div class="run-media-actions"><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">打开</a><a href="${safeUrl}" download="${filename}" target="_blank" rel="noopener noreferrer">${escapeHtml(downloadLabel)}</a></div>`;
    }

    function renderMediaPreviews(bubble, urls) {
      if (!bubble || !urls || !urls.length) return;
      let box = bubble._mediaEl;
      if (!box || !box.isConnected) {
        box = document.createElement("div");
        box.className = "media-preview";
        bubble.appendChild(box);
        bubble._mediaEl = box;
      }
      box.innerHTML = "";
      urls.forEach((url) => {
        const low = url.toLowerCase();
        const item = document.createElement("div");
        item.className = "media-item";
        let el;
        let downloadLabel = "下载文件";
        let fallbackName = "lobster-media";
        if (/\.(mp4|webm|mov)(\?|#|$)/.test(low)) {
          el = document.createElement("video");
          el.src = url;
          el.controls = true;
          el.playsInline = true;
          downloadLabel = "下载视频";
          fallbackName = "lobster-video.mp4";
        } else if (/\.(mp3|wav|m4a|aac|ogg)(\?|#|$)/.test(low)) {
          el = document.createElement("audio");
          el.src = url;
          el.controls = true;
          downloadLabel = "下载音频";
          fallbackName = "lobster-audio.mp3";
        } else if (/\.(png|jpe?g|webp|gif)(\?|#|$)/.test(low)) {
          const a = document.createElement("a");
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          el = document.createElement("img");
          el.src = url;
          el.alt = "生成素材预览";
          a.appendChild(el);
          item.appendChild(a);
          item.appendChild(mediaActions(url, "下载图片", "lobster-image.png"));
          box.appendChild(item);
          return;
        } else {
          el = document.createElement("a");
          el.href = url;
          el.target = "_blank";
          el.rel = "noopener noreferrer";
          el.textContent = "打开预览";
        }
        item.appendChild(el);
        item.appendChild(mediaActions(url, downloadLabel, fallbackName));
        box.appendChild(item);
      });
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function clearEmpty() {
      $("empty")?.classList.add("hidden");
    }

    function addBubble(role, text) {
      clearEmpty();
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      el._rawText = text || "";
      const textEl = document.createElement("span");
      textEl.className = "bubble-text";
      el._textEl = textEl;
      el.appendChild(textEl);
      renderBubbleText(el);
      if (role === "bot") {
        const steps = document.createElement("div");
        steps.className = "steps";
        el.appendChild(steps);
        el._steps = steps;
      }
      $("messages").appendChild(el);
      $("messages").scrollTop = $("messages").scrollHeight;
      return el;
    }

    function addStep(bubble, text) {
      if (!SHOW_INTERNAL_STEPS || !bubble || !bubble._steps || !text) return;
      const s = document.createElement("span");
      s.className = "step";
      s.textContent = text;
      bubble._steps.appendChild(s);
    }

    function setBubbleText(bubble, text) {
      if (!bubble) return;
      bubble._rawText = text || "";
      renderBubbleText(bubble);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function appendBubbleText(bubble, text) {
      if (!text || !bubble) return;
      bubble._rawText = (bubble._rawText || "") + text;
      renderBubbleText(bubble);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function eventLabel(ev) {
      const p = ev.payload || {};
      if (!SHOW_INTERNAL_STEPS) return "";
      if (ev.type === "queued") return "已进入云端队列";
      if (ev.type === "claimed") return "本地设备已领取";
      if (ev.type === "thinking") return p.text || "正在处理";
      if (ev.type === "tool_start") return p.name ? `调用能力：${p.name}` : "调用能力";
      if (ev.type === "tool_end") return p.name ? `能力完成：${p.name}` : "能力完成";
      if (ev.type === "progress") return p.text || p.message || "处理中";
      return "";
    }

    function closeStream(messageId) {
      const es = state.streams.get(messageId);
      if (es) es.close();
      state.streams.delete(messageId);
      const poll = state.pollers.get(messageId);
      if (poll) clearInterval(poll);
      state.pollers.delete(messageId);
    }

    function handleEvent(ev, bubble, messageId) {
      if (!ev || !bubble) return;
      const label = eventLabel(ev);
      if (label) addStep(bubble, label);
      if (ev.type === "delta" && ev.payload && ev.payload.text) appendBubbleText(bubble, ev.payload.text);
      renderMediaPreviews(bubble, collectMediaUrls(ev.payload || {}));
      if (ev.type === "final") {
        const reply = (ev.payload && (ev.payload.reply_text || ev.payload.text)) || "处理完成。";
        setBubbleText(bubble, reply);
        renderMediaPreviews(bubble, collectMediaUrls(ev.payload || {}));
        closeStream(messageId);
      }
      if (ev.type === "error") {
        bubble.classList.add("err");
        setBubbleText(bubble, (ev.payload && (ev.payload.error || ev.payload.detail)) || "处理失败");
        closeStream(messageId);
      }
    }

    function startPolling(messageId, bubble, lastEventId = 0) {
      if (state.pollers.has(messageId)) return;
      let last = lastEventId;
      const timer = setInterval(async () => {
        try {
          const data = await api(`/api/h5-chat/messages/${messageId}?after_event_id=${last}`);
          for (const ev of data.events || []) {
            last = Math.max(last, ev.id || 0);
            handleEvent(ev, bubble, messageId);
          }
          if (data.message && ["completed", "failed", "cancelled"].includes(data.message.status)) {
            if (data.message.status === "completed" && data.message.reply_text) setBubbleText(bubble, data.message.reply_text);
            if (data.message.status === "failed") {
              bubble.classList.add("err");
              setBubbleText(bubble, data.message.error || "处理失败");
            }
            closeStream(messageId);
          }
        } catch (err) {
          bubble.classList.add("err");
          setBubbleText(bubble, err.message || "查询失败");
          closeStream(messageId);
        }
      }, 1400);
      state.pollers.set(messageId, timer);
    }

    function startSse(messageId, bubble) {
      if (!window.EventSource) {
        startPolling(messageId, bubble, 0);
        return;
      }
      let last = 0;
      const es = new EventSource(`/api/h5-chat/messages/${messageId}/events?token=${encodeURIComponent(state.token)}`);
      state.streams.set(messageId, es);
      ["queued", "claimed", "thinking", "progress", "tool_start", "tool_end", "delta", "final", "error"].forEach((type) => {
        es.addEventListener(type, (evt) => {
          try {
            const ev = JSON.parse(evt.data || "{}");
            last = Math.max(last, ev.id || 0);
            handleEvent(ev, bubble, messageId);
          } catch (err) {
            console.warn("Bad SSE event", err);
          }
        });
      });
      es.onerror = () => {
        es.close();
        state.streams.delete(messageId);
        startPolling(messageId, bubble, last);
      };
    }

    function clearRenderedMessages() {
      $("messages").querySelectorAll(".bubble").forEach((el) => el.remove());
      const empty = $("empty");
      if (empty) empty.classList.remove("hidden");
    }

    function renderHistoryItem(item) {
      const msg = (item && item.message) || {};
      if (!msg.id) return;
      const events = Array.isArray(item.events) ? item.events : [];
      const isFinal = ["completed", "failed", "cancelled"].includes(msg.status);
      const hasDelta = events.some((ev) => ev && ev.type === "delta");
      addBubble("user", msg.content || "");
      let initialText = "已恢复，等待本地设备处理...";
      if (msg.status === "completed") initialText = msg.reply_text || "处理完成。";
      if (msg.status === "failed") initialText = msg.error || "处理失败";
      if (!isFinal && hasDelta) initialText = "";
      const bot = addBubble("bot", initialText);
      if (msg.status === "failed") bot.classList.add("err");
      let finalPayload = null;
      for (const ev of events) {
        if (ev && ev.type === "final") finalPayload = ev.payload || null;
        handleEvent(ev, bot, msg.id);
      }
      if (msg.status === "completed" && msg.reply_text) setBubbleText(bot, msg.reply_text);
      if (finalPayload) renderMediaPreviews(bot, collectMediaUrls(finalPayload));
      if (msg.status === "failed") {
        bot.classList.add("err");
        setBubbleText(bot, msg.error || "处理失败");
      }
      if (!isFinal) startSse(msg.id, bot);
    }

    async function loadHistory() {
      if (!state.token) return;
      try {
        const data = await api("/api/h5-chat/messages?limit=40");
        const items = Array.isArray(data.messages) ? data.messages : [];
        if (!items.length) return;
        clearRenderedMessages();
        for (const item of items) renderHistoryItem(item);
      } catch (err) {
        console.warn("Load H5 history failed", err);
      }
    }

    function collectRunMediaUrls(row) {
      const payload = row && row.result_payload && typeof row.result_payload === "object" ? row.result_payload : {};
      return collectMediaUrls(payload).slice(0, 4);
    }

    function renderRunMedia(urls) {
      if (!urls || !urls.length) return "";
      return `<div class="run-media">${urls.map((url) => {
        const low = url.toLowerCase();
        if (/\.(mp4|webm|mov)(\?|#|$)/.test(low)) {
          return `<div class="run-media-item"><video controls src="${escapeHtml(url)}"></video>${mediaActionHtml(url, "下载视频", "lobster-video.mp4")}</div>`;
        }
        if (/\.(png|jpe?g|webp|gif)(\?|#|$)/.test(low)) {
          return `<div class="run-media-item"><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"><img src="${escapeHtml(url)}" alt="预览"></a>${mediaActionHtml(url, "下载图片", "lobster-image.png")}</div>`;
        }
        return `<div class="run-media-item"><a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">打开预览</a>${mediaActionHtml(url, "下载文件", "lobster-media")}</div>`;
      }).join("")}</div>`;
    }

    async function loadRuns() {
      const box = $("runList");
      if (!state.token || !box) return;
      box.innerHTML = `<div class="hint">加载中...</div>`;
      try {
        const data = await api("/api/scheduled-tasks/runs?limit=30");
        const rows = Array.isArray(data.runs) ? data.runs : [];
        if (!rows.length) {
          box.innerHTML = `<div class="hint">暂无执行记录。</div>`;
          return;
        }
        box.innerHTML = rows.map((row) => {
          const result = row.error || row.result_text || (row.progress && (row.progress.text || row.progress.message)) || "";
          return `<div class="run-card">
            <div class="run-top"><span>${escapeHtml(fmtTime(row.created_at))}</span><span>${escapeHtml(statusText(row.status))}</span></div>
            <div class="run-title">${escapeHtml(row.title || "定时任务")}</div>
            <div class="run-result">${escapeHtml(result || "等待结果")}</div>
            ${renderRunMedia(collectRunMediaUrls(row))}
          </div>`;
        }).join("");
      } catch (err) {
        box.innerHTML = `<div class="hint">${escapeHtml(err.message || "执行记录加载失败")}</div>`;
      }
    }

    document.querySelectorAll("[data-tab-target]").forEach((btn) => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tabTarget));
    });
    document.querySelectorAll("[data-task-ability]").forEach((btn) => {
      btn.addEventListener("click", () => setTaskAbility(btn.dataset.taskAbility));
    });
    $("toggleTaskPanelBtn").addEventListener("click", () => setTaskPanelOpen(!state.taskPanelOpen));
    $("autoPickDigitalBtn").addEventListener("click", autoPickDigital);
    $("createTaskBtn").addEventListener("click", () => createScheduledTask().catch((err) => toast(err.message || "下发失败")));
    $("refreshStatusBtn").addEventListener("click", refreshDeviceStatus);
    $("refreshProfileBtn").addEventListener("click", () => Promise.all([refreshDeviceStatus(), loadTasks(), loadRuns()]));
    $("refreshTasksBtn").addEventListener("click", loadTasks);
    $("refreshRunsBtn").addEventListener("click", loadRuns);
    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("lobster_h5_token");
      state.token = "";
      location.reload();
    });
    $("captchaImg").addEventListener("click", refreshCaptcha);

    $("taskList").addEventListener("click", (evt) => {
      const btn = evt.target.closest("[data-delete-task]");
      if (!btn) return;
      deleteTask(btn.dataset.deleteTask, btn);
    });

    $("homeQuickGrid").addEventListener("click", (evt) => {
      const btn = evt.target.closest("button");
      if (!btn) return;
      switchTab("messages");
      setMessageTemplate(btn.dataset.prompt || "");
      if (btn.dataset.imageVideo === "1") setTimeout(() => $("imageInput").click(), 120);
      setTimeout(scrollMessagesToBottom, 160);
    });

    $("messageInput").addEventListener("input", autosizeMessageInput);
    $("messageInput").addEventListener("keydown", (evt) => {
      if (evt.key === "Enter" && !evt.shiftKey && !evt.isComposing) {
        if ($("sendForm").classList.contains("expanded")) return;
        evt.preventDefault();
        $("sendForm").requestSubmit();
      }
    });
    $("toggleComposerBtn").addEventListener("click", () => {
      setComposerExpanded(!$("sendForm").classList.contains("expanded"));
    });

    $("imageInput").addEventListener("change", async () => {
      const files = Array.from($("imageInput").files || []);
      $("imageInput").value = "";
      if (!files.length) return;
      if (!state.token) {
        toast("请先登录后再上传图片");
        return;
      }
      for (const file of files) {
        if (!/^image\//i.test(file.type || "")) {
          toast("只能上传图片");
          continue;
        }
        uploadImageFile(file);
      }
    });

    $("loginForm").addEventListener("submit", async (evt) => {
      evt.preventDefault();
      $("loginBtn").disabled = true;
      try {
        const form = new FormData(evt.currentTarget);
        const resp = await fetch("/auth/login", { method: "POST", body: form });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || "登录失败");
        state.token = data.access_token;
        localStorage.setItem("lobster_h5_token", state.token);
        await loadMe();
      } catch (err) {
        toast(err.message || "登录失败");
        await refreshCaptcha();
      } finally {
        $("loginBtn").disabled = false;
      }
    });

    $("sendForm").addEventListener("submit", async (evt) => {
      evt.preventDefault();
      const input = $("messageInput");
      const content = input.value.trim();
      if (hasUploadingImages()) {
        toast("图片还在上传中，请稍等");
        return;
      }
      if (!content) return;
      input.value = "";
      autosizeMessageInput();
      $("sendBtn").disabled = true;
      const messageContent = buildMessageContent(content);
      addBubble("user", content);
      const bot = addBubble("bot", "已发送，等待本地设备处理...");
      try {
        const data = await api("/api/h5-chat/messages", { method: "POST", json: { content: messageContent, mode: state.mode } });
        const msg = data.message || {};
        if (msg.id) startSse(msg.id, bot);
        clearUploads();
        await refreshDeviceStatus();
      } catch (err) {
        bot.classList.add("err");
        setBubbleText(bot, err.message || "发送失败");
      } finally {
        $("sendBtn").disabled = false;
        input.focus();
      }
    });

    (async function init() {
      setTaskAbility("goal.video.pipeline");
      const ok = await loadMe();
      if (!ok) {
        $("loginPanel").classList.remove("hidden");
        $("appPanel").classList.add("hidden");
        $("userbox").classList.add("hidden");
        $("bottomNav").classList.add("hidden");
        await refreshCaptcha();
      }
      setInterval(refreshDeviceStatus, 7000);
    })();
  </script>
</body>
</html>
