<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>必火AI员工管理后台</title>
<link rel="icon" type="image/png" href="/admin/static/bihu_32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--primary:#4f46e5;--primary-hover:#4338ca;--danger:#ef4444;--success:#22c55e;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08);--agent-color:#f59e0b;--agent-bg:#fffbeb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px;width:100%;max-width:380px}
.login-card h1{text-align:center;margin-bottom:8px;font-size:22px;color:var(--primary)}
.login-card .login-hint{display:none}
.login-tabs{display:flex;gap:4px;margin:18px 0;background:var(--bg);padding:4px;border-radius:8px}
.login-tab{flex:1;border:0;background:transparent;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary)}
.login-tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
.login-panel{display:none}
.login-panel.active{display:block}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text-secondary)}
.form-group input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--primary)}
.captcha-row{display:flex;gap:8px;align-items:center}
.captcha-row input{flex:1;min-width:0}
.captcha-row img{width:112px;height:40px;border:1px solid var(--border);border-radius:8px;object-fit:cover;cursor:pointer;background:#fff}
.sms-row{display:flex;gap:8px;align-items:center}
.sms-row input{flex:1;min-width:0}
.sms-row .btn{width:auto;white-space:nowrap}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-primary:hover{background:var(--primary-hover)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--bg)}
.btn-agent{background:var(--agent-color);color:#fff}
.btn-agent:hover{background:#d97706}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;text-align:center}

/* Dashboard */
.dashboard{display:none}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px;color:var(--primary)}
.topbar.agent-topbar h2{color:var(--agent-color)}
.topbar .user-info{display:flex;align-items:center;gap:12px}
.nav-tabs{display:flex;gap:2px;margin-left:32px}
.nav-tab{padding:8px 20px;border-radius:6px 6px 0 0;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);transition:all .15s;border-bottom:2px solid transparent}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.nav-tab:hover:not(.active){color:var(--text)}
.container{max-width:1100px;margin:0 auto;padding:24px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stats-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;text-align:center}
.stats-card .sc-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stats-card .sc-value{font-size:28px;font-weight:700;color:var(--primary)}
.stats-card .sc-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.chart-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.chart-card h3{font-size:15px;margin-bottom:16px;color:var(--text)}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.chart-bar-label{width:80px;text-align:right;color:var(--text-secondary);flex-shrink:0}
.chart-bar{height:22px;background:var(--primary);border-radius:4px;min-width:2px;transition:width .3s ease}
.chart-bar-value{color:var(--text-secondary);min-width:48px}
.chart-bar.green{background:var(--success)}
.chart-bar.red{background:var(--danger)}
.chart-bar.yellow{background:#f59e0b}
.rank-table{width:100%}
.rank-table td{padding:8px 12px;font-size:13px}
.rank-table tr:nth-child(even){background:var(--bg)}
.rank-num{width:32px;font-weight:700;color:var(--primary)}
.search-bar{display:flex;gap:10px;margin-bottom:24px}
.search-bar input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.search-bar input:focus{outline:none;border-color:var(--primary)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.card h3{font-size:16px;margin-bottom:16px;color:var(--text)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:12px}
.stat-item{text-align:center;padding:12px;background:var(--bg);border-radius:8px}
.stat-item .label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-item .value{font-size:20px;font-weight:700;color:var(--primary)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{font-weight:600;color:var(--text-secondary);font-size:12px;text-transform:uppercase}
tr:hover{background:var(--bg)}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-purple{background:#f3e8ff;color:#6b21a8}
.credits-value{font-weight:700;color:var(--primary)}
.recharge-row{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.recharge-row input{width:120px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.recharge-row input:focus{outline:none;border-color:var(--primary)}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px}
.empty{text-align:center;padding:40px;color:var(--text-secondary)}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:100;animation:slideIn .3s ease}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg);padding:4px;border-radius:8px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all .15s}
.tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
.tab:hover:not(.active){color:var(--text)}
.detail-back{cursor:pointer;color:var(--primary);font-size:13px;margin-bottom:12px;display:inline-flex;align-items:center;gap:4px}
.detail-back:hover{text-decoration:underline}
.user-detail-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg);padding:4px;border-radius:8px;overflow-x:auto}
.user-detail-tab{border:0;background:transparent;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);white-space:nowrap}
.user-detail-tab.active{background:var(--card);color:var(--primary);box-shadow:var(--shadow)}
.user-detail-panel{display:none}
.user-detail-panel.active{display:block}
/* Modal */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-mask.show{display:flex}
.modal-card{background:var(--card);border-radius:var(--radius);box-shadow:0 10px 40px rgba(0,0,0,.18);padding:24px;width:100%;max-width:380px}
.modal-card h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.modal-card .modal-sub{font-size:12px;color:var(--text-secondary);margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modal-card .form-group input[type="password"]{width:100%}
/* Agent claim bar */
.claim-bar{display:flex;gap:10px;margin-bottom:20px;align-items:center;padding:16px;background:var(--agent-bg);border:1px solid #fde68a;border-radius:var(--radius)}
.claim-bar input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.claim-bar input:focus{outline:none;border-color:var(--agent-color)}
.agent-banner{padding:12px 24px;background:var(--agent-bg);border-bottom:1px solid #fde68a;font-size:13px;color:#92400e;text-align:center}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.agent-action-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
.agent-action-row select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;min-width:180px;background:#fff}

/* Mobile responsive */
@media(max-width:768px){
  .topbar{padding:10px 12px;flex-wrap:wrap;gap:8px}
  .topbar h2{font-size:15px}
  .nav-tabs{margin-left:0;width:100%;order:3}
  .nav-tab{padding:6px 14px;font-size:13px;flex:1;text-align:center}
  .topbar .user-info{gap:8px}
  .topbar .user-info #adminName{display:none}
  .container{padding:12px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .stats-card{padding:14px}
  .stats-card .sc-value{font-size:22px}
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-item .value{font-size:16px}
  .chart-card{padding:14px}
  .search-bar{flex-direction:column;gap:8px}
  .search-bar input{width:100%}
  .search-bar .btn{width:100%}
  .claim-bar{flex-direction:column;gap:8px;padding:12px}
  .claim-bar input{width:100%}
  .claim-bar .btn{width:100%}
  .agent-action-row select{width:100%;min-width:0}
  .recharge-row{flex-direction:column;gap:8px}
  .recharge-row input{width:100%}
  .recharge-row .btn{width:100%}
  .card{padding:14px}
  .card h3{font-size:15px;margin-bottom:12px}
  th,td{padding:8px 6px;font-size:12px}
  .chart-bar-label{width:50px;font-size:11px}
  .chart-bar-value{font-size:11px;min-width:36px}
  .login-card{padding:24px}
  .login-card h1{font-size:18px}
  .login-tab{font-size:12px;padding:8px 6px}
  .modal-card{padding:20px;margin:12px}
  .toast{right:12px;left:12px;text-align:center}
  .badge{font-size:10px;padding:2px 6px}
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .stats{grid-template-columns:1fr 1fr}
  .stat-item .value{font-size:14px}
  .topbar h2{font-size:14px}
  .nav-tab{font-size:12px;padding:5px 10px}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:12px"><img src="/admin/static/bihu_64.png" width="56" height="56" style="border-radius:12px"></div>
    <h1>必火AI员工管理后台</h1>
    <div class="login-tabs">
      <button class="login-tab active" type="button" data-login-tab="password" onclick="switchLoginTab('password')">账号密码登录</button>
      <button class="login-tab" type="button" data-login-tab="sms" onclick="switchLoginTab('sms')">手机号验证码登录</button>
    </div>
    <div class="login-panel active" id="loginPanelPassword">
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="loginUser" autocomplete="username" placeholder="管理员用户名 / 代理商手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPass" autocomplete="current-password" placeholder="密码">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>
    <div class="login-panel" id="loginPanelSms">
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="loginSmsPhone" autocomplete="username" placeholder="代理商手机号">
      </div>
      <div class="form-group">
        <label>图形验证码</label>
        <div class="captcha-row">
          <input type="text" id="loginCaptchaAnswer" placeholder="验证码">
          <img id="loginCaptchaImg" alt="验证码" title="点击刷新" onclick="loadLoginCaptcha()">
        </div>
      </div>
      <div class="form-group">
        <label>短信验证码</label>
        <div class="sms-row">
          <input type="text" id="loginSmsCode" autocomplete="one-time-code" placeholder="短信验证码">
          <button class="btn btn-outline btn-sm" id="sendLoginSmsBtn" type="button" onclick="sendLoginSms()">发送验证码</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboardView">
  <div class="topbar" id="topbar">
    <div style="display:flex;align-items:center">
      <h2 id="topbarTitle"><img src="/admin/static/bihu_32.png" width="28" height="28" style="vertical-align:middle;margin-right:6px;border-radius:6px">必火AI管理后台</h2>
      <div class="nav-tabs" id="navTabs">
        <div class="nav-tab active" data-nav="stats" onclick="switchNav('stats')">统计</div>
        <div class="nav-tab" data-nav="users" onclick="switchNav('users')">用户信息</div>
        <div class="nav-tab" data-nav="commissions" id="commissionNavTab" onclick="switchNav('commissions')" style="display:none">分润</div>
      </div>
    </div>
    <div class="user-info">
      <span id="adminName" style="font-size:13px;color:var(--text-secondary)"></span>
      <span id="roleBadge" class="badge" style="display:none"></span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
    </div>
  </div>

  <!-- Agent banner -->
  <div class="agent-banner" id="agentBanner" style="display:none;align-items:center;gap:12px;flex-wrap:wrap">
    <span>代理商模式 — 仅显示您的下级用户数据</span>
    <button class="btn btn-agent btn-sm" id="agentMemoryEntryBtn" type="button" onclick="openMyAgentMemory()" style="display:none">管理我的代理商记忆</button>
  </div>

  <!-- Page: Users -->
  <div class="container" id="pageUsers" style="display:none">
    <!-- Agent: 认领下级 -->
    <div class="claim-bar" id="claimBar" style="display:none">
      <span style="font-weight:600;color:#92400e;white-space:nowrap">添加下级：</span>
      <input type="text" id="claimAccount" placeholder="输入用户手机号或账号…" onkeydown="if(event.key==='Enter')doClaimSub()">
      <button class="btn btn-agent btn-sm" onclick="doClaimSub()">认领</button>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索用户：输入手机号、账号、邮箱或用户ID…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary btn-sm" onclick="doSearch()">搜索</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="search" onclick="switchTab('search')">搜索结果</div>
      <div class="tab" data-tab="all" onclick="switchTab('all')">全部用户</div>
    </div>

    <div id="tabSearch">
      <div class="card" id="searchResults">
        <div class="empty">输入关键词搜索用户</div>
      </div>
    </div>

    <div id="tabAll" style="display:none">
      <div class="card" id="allUsersCard">
        <h3>全部用户</h3>
        <div id="allUsersTable"></div>
        <div class="pagination" id="allUsersPagination"></div>
      </div>
    </div>

    <div id="userDetailView" style="display:none">
      <div class="detail-back" onclick="hideDetail()">&larr; 返回列表</div>
      <div class="card" id="userDetailCard"></div>
      <div class="card" id="userDevicesTaskCard" style="display:none">
        <h3>设备与任务</h3>
        <div id="userDevicesTaskSection"><div class="empty">请选择用户后加载</div></div>
      </div>
      <!-- admin-only: agent toggle -->
      <div class="card" id="agentToggleCard" style="display:none">
        <h3>代理商管理</h3>
        <div id="agentToggleSection"></div>
      </div>
      <div class="card" id="openclawMemoryAdminCard" style="display:none">
        <h3>OpenClaw 记忆</h3>
        <div id="openclawMemoryAdminSection">
          <div class="empty">请选择用户后加载</div>
        </div>
      </div>
      <div class="card" id="rechargeCard">
        <h3>充值积分</h3>
        <div class="recharge-row">
          <input type="number" id="rechargeAmount" placeholder="积分数量" step="1">
          <input type="text" id="rechargeDesc" placeholder="备注（可选）" value="管理员手动加积分" style="flex:1;min-width:0">
          <button class="btn btn-success btn-sm" onclick="doAddCredits()">充值</button>
          <button class="btn btn-outline btn-sm" id="resetPwdBtn" onclick="openResetPassword()" style="margin-left:8px">重置密码</button>
        </div>
      </div>
      <!-- admin-only: skill visibility -->
      <div class="card" id="skillVisCard" style="display:none">
        <h3>可见技能</h3>
        <div id="skillVisibilitySection">
          <div class="empty">加载中…</div>
        </div>
      </div>
      <div class="card">
        <h3 id="ledgerTitle">积分流水</h3>
        <div id="ledgerTable"></div>
        <div class="pagination" id="ledgerPagination"></div>
      </div>
      <!-- agent: remove sub -->
      <div class="card" id="removeSubCard" style="display:none">
        <h3>下级管理</h3>
        <div id="removeSubSection"></div>
      </div>
    </div>
  </div>

  <!-- Page: Stats -->
  <div class="container" id="pageStats">
    <div id="statsOverview" class="stats-grid"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="chart-card"><h3>每日新增用户</h3><div id="chartDailyUsers"></div></div>
      <div class="chart-card"><h3>每日充值积分</h3><div id="chartDailyRecharge"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="chart-card"><h3>每日消耗积分</h3><div id="chartDailyConsume"></div></div>
      <div class="chart-card"><h3>能力调用排行</h3><div id="chartCapRanking"></div></div>
    </div>
    <div class="chart-card"><h3>积分消耗 TOP 10 用户</h3><div id="chartTopConsumers"></div></div>
  </div>

  <!-- Page: Agent commissions -->
  <div class="container" id="pageCommissions" style="display:none">
    <div id="commissionOverview" class="stats-grid"></div>
    <div class="card">
      <h3>成功充值分润记录</h3>
      <div id="commissionTable"><div class="empty">加载中...</div></div>
      <div class="pagination" id="commissionPagination"></div>
    </div>
  </div>
</div>

<!-- 重置密码弹窗 -->
<div class="modal-mask" id="resetPwdModal" onclick="if(event.target===this)closeResetPassword()">
  <div class="modal-card">
    <h3>重置用户密码</h3>
    <div class="modal-sub" id="resetPwdSub">将为该用户设置一个新的登录密码（6～128 位）。</div>
    <div class="form-group">
      <label>新密码</label>
      <input type="password" id="resetPwdNew" autocomplete="new-password" placeholder="至少 6 位">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="resetPwdConfirm" autocomplete="new-password" placeholder="再次输入新密码">
    </div>
    <div class="error-msg" id="resetPwdError" style="text-align:left;min-height:18px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeResetPassword()">取消</button>
      <button class="btn btn-primary btn-sm" id="resetPwdSubmit" onclick="doResetPassword()" style="width:auto">确认重置</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let TOKEN = localStorage.getItem('admin_token') || '';
let ROLE = localStorage.getItem('admin_role') || '';
let DISPLAY_NAME = localStorage.getItem('admin_display_name') || '';
let MY_USER_ID = parseInt(localStorage.getItem('admin_my_user_id') || '0', 10) || 0;
let AGENT_LEVEL = parseInt(localStorage.getItem('admin_agent_level') || '0', 10) || 0;
let secondAgentOptionsCache = null;

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json'};
  if (TOKEN) headers['X-Admin-Token'] = TOKEN;
  const res = await fetch(API + path, {...opts, headers});
  const data = await res.json();
  if (!res.ok) {
    if (res.status === 401) { doLogout(); }
    throw new Error(data.detail || '请求失败');
  }
  return data;
}

async function loadLoginCaptcha() {
  const img = document.getElementById('loginCaptchaImg');
  if (!img) return;
  try {
    const res = await fetch(API + '/auth/captcha');
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '验证码加载失败');
    loginCaptchaId = data.captcha_id || '';
    img.src = data.image || '';
    const input = document.getElementById('loginCaptchaAnswer');
    if (input) input.value = '';
  } catch(e) {
    toast(e.message || '验证码加载失败', 'error');
  }
}

function switchLoginTab(tab) {
  currentLoginTab = tab === 'sms' ? 'sms' : 'password';
  document.querySelectorAll('.login-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-login-tab') === currentLoginTab);
  });
  document.getElementById('loginPanelPassword').classList.toggle('active', currentLoginTab === 'password');
  document.getElementById('loginPanelSms').classList.toggle('active', currentLoginTab === 'sms');
  const err = document.getElementById('loginError');
  if (err) err.textContent = '';
  if (currentLoginTab === 'sms') {
    loadLoginCaptcha();
  }
}

function startLoginSmsCooldown(seconds) {
  const btn = document.getElementById('sendLoginSmsBtn');
  if (!btn) return;
  let left = seconds || 60;
  btn.disabled = true;
  clearInterval(loginSmsCooldownTimer);
  const tick = function() {
    btn.textContent = left > 0 ? left + 's' : '发送验证码';
    if (left <= 0) {
      clearInterval(loginSmsCooldownTimer);
      loginSmsCooldownTimer = null;
      btn.disabled = false;
    }
    left -= 1;
  };
  tick();
  loginSmsCooldownTimer = setInterval(tick, 1000);
}

async function sendLoginSms() {
  const phone = document.getElementById('loginSmsPhone').value.trim();
  const captchaAnswer = document.getElementById('loginCaptchaAnswer').value.trim();
  if (!phone) { toast('请输入代理商手机号', 'error'); return; }
  if (!captchaAnswer) { toast('请输入图形验证码', 'error'); return; }
  try {
    await api('/auth/sms/send', {
      method: 'POST',
      body: JSON.stringify({phone, captcha_id: loginCaptchaId, captcha_answer: captchaAnswer})
    });
    toast('短信验证码已发送');
    startLoginSmsCooldown(60);
  } catch(e) {
    toast(e.message, 'error');
    await loadLoginCaptcha();
  }
}

async function apiForm(path, formData) {
  const headers = {};
  if (TOKEN) headers['X-Admin-Token'] = TOKEN;
  const res = await fetch(API + path, { method: 'POST', headers, body: formData });
  const data = await res.json();
  if (!res.ok) {
    if (res.status === 401) { doLogout(); }
    throw new Error(data.detail || '请求失败');
  }
  return data;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

async function doLogin() {
  const isSms = currentLoginTab === 'sms';
  const u = (isSms ? document.getElementById('loginSmsPhone') : document.getElementById('loginUser')).value.trim();
  const p = isSms ? '' : document.getElementById('loginPass').value.trim();
  const smsCode = isSms ? document.getElementById('loginSmsCode').value.trim() : '';
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!u) { err.textContent = '请输入账号'; return; }
  if (isSms && !smsCode) { err.textContent = '请输入短信验证码'; return; }
  if (!isSms && !p) { err.textContent = '请输入密码'; return; }
  try {
    const data = await api('/admin/api/login', {
      method:'POST',
      body: JSON.stringify({
        username: u,
        password: p,
        sms_code: smsCode,
      })
    });
    TOKEN = data.token;
    ROLE = data.role || 'admin';
    DISPLAY_NAME = data.display_name || '管理员';
    MY_USER_ID = parseInt(data.user_id || 0, 10) || 0;
    AGENT_LEVEL = parseInt(data.agent_level || 0, 10) || 0;
    localStorage.setItem('admin_token', TOKEN);
    localStorage.setItem('admin_role', ROLE);
    localStorage.setItem('admin_display_name', DISPLAY_NAME);
    if (MY_USER_ID) localStorage.setItem('admin_my_user_id', String(MY_USER_ID));
    else localStorage.removeItem('admin_my_user_id');
    if (AGENT_LEVEL) localStorage.setItem('admin_agent_level', String(AGENT_LEVEL));
    else localStorage.removeItem('admin_agent_level');
    showDashboard();
  } catch(e) {
    err.textContent = e.message;
    if (isSms) await loadLoginCaptcha();
  }
}

function doLogout() {
  TOKEN = '';
  ROLE = '';
  DISPLAY_NAME = '';
  MY_USER_ID = 0;
  AGENT_LEVEL = 0;
  localStorage.removeItem('admin_token');
  localStorage.removeItem('admin_role');
  localStorage.removeItem('admin_display_name');
  localStorage.removeItem('admin_my_user_id');
  localStorage.removeItem('admin_agent_level');
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('dashboardView').style.display = 'none';
  if (currentLoginTab === 'sms') loadLoginCaptcha();
}

function isViewingSelf(userId) { return isAgent() && MY_USER_ID && Number(userId) === Number(MY_USER_ID); }

let currentPage = 1;
async function loadAllUsers(page) {
  currentPage = page;
  try {
    const data = await api('/admin/api/users?page=' + page + '&page_size=20');
    const title = isAgent() ? '我的下级用户' : null;
    renderUserTable(data.users, 'allUsersTable', title);
    renderPagination(data.total, data.page, data.page_size);
  } catch(e) { toast(e.message, 'error'); }
}

function renderPagination(total, page, pageSize) {
  const pages = Math.ceil(total / pageSize);
  const el = document.getElementById('allUsersPagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  if (page > 1) html += `<button class="btn btn-outline btn-sm" onclick="loadAllUsers(${page-1})">上一页</button>`;
  html += `<span style="padding:6px 12px;font-size:13px;color:var(--text-secondary)">第 ${page}/${pages} 页（共 ${total} 条）</span>`;
  if (page < pages) html += `<button class="btn btn-outline btn-sm" onclick="loadAllUsers(${page+1})">下一页</button>`;
  el.innerHTML = html;
}

function renderUserTable(users, containerId, title) {
  const el = document.getElementById(containerId);
  if (!users.length) {
    el.innerHTML = (title ? `<h3>${title}</h3>` : '') + '<div class="empty">未找到用户</div>';
    return;
  }
  let html = title ? `<h3>${title}（${users.length} 条）</h3>` : '';
  html += `<div class="table-wrap"><table><thead><tr><th>ID</th><th>账号</th><th>积分</th><th>角色</th>`;
  if (isAdmin()) html += `<th>代理</th>`;
  html += `<th>注册时间</th><th></th></tr></thead><tbody>`;
  for (const u of users) {
    const email = u.email.replace(/@sms\.lobster\.local$/, '');
    const agentLabel = u.agent_level === 2 ? '二级代理' : (u.is_agent ? '代理' : '-');
    html += `<tr>
      <td>${u.id}</td>
      <td>${email}</td>
      <td class="credits-value">${u.credits.toFixed(0)}</td>
      <td><span class="badge ${u.role==='admin'?'badge-red':'badge-blue'}">${u.role}</span></td>`;
    if (isAdmin()) {
      html += `<td>${u.is_agent ? '<span class="badge badge-yellow">' + agentLabel + '</span>' : '-'}</td>`;
    }
    html += `<td style="font-size:11px;color:var(--text-secondary)">${u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '-'}</td>
      <td><button class="btn btn-outline btn-sm" onclick="showUserDetail(${u.id})">详情</button></td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function ensureUserDetailTabs() {
  const root = document.getElementById('userDetailView');
  if (!root || document.getElementById('userDetailTabs')) return;
  const back = root.querySelector('.detail-back');
  const tabs = document.createElement('div');
  tabs.className = 'user-detail-tabs';
  tabs.id = 'userDetailTabs';
  const defs = [
    ['overview', '概览'],
    ['billing', '积分'],
    ['skills', '技能/权限'],
    ['devices', '设备/任务'],
    ['memory', 'OpenClaw 记忆'],
  ];
  tabs.innerHTML = defs.map(function(x, idx) {
    return '<button type="button" class="user-detail-tab' + (idx === 0 ? ' active' : '') + '" data-user-detail-tab="' + x[0] + '">' + x[1] + '</button>';
  }).join('');
  if (back && back.nextSibling) root.insertBefore(tabs, back.nextSibling);
  else root.insertBefore(tabs, root.firstChild);

  defs.forEach(function(x, idx) {
    const panel = document.createElement('div');
    panel.id = 'userDetailPanel' + x[0].charAt(0).toUpperCase() + x[0].slice(1);
    panel.className = 'user-detail-panel' + (idx === 0 ? ' active' : '');
    root.appendChild(panel);
  });
  const move = function(id, tab) {
    const node = document.getElementById(id);
    const panel = document.getElementById('userDetailPanel' + tab.charAt(0).toUpperCase() + tab.slice(1));
    if (node && panel) panel.appendChild(node);
  };
  move('userDetailCard', 'overview');
  move('removeSubCard', 'overview');
  move('rechargeCard', 'billing');
  const ledgerTable = document.getElementById('ledgerTable');
  if (ledgerTable) {
    const ledgerCard = ledgerTable.closest('.card');
    const panel = document.getElementById('userDetailPanelBilling');
    if (ledgerCard && panel) panel.appendChild(ledgerCard);
  }
  move('agentToggleCard', 'skills');
  move('skillVisCard', 'skills');
  move('userDevicesTaskCard', 'devices');
  move('openclawMemoryAdminCard', 'memory');
  tabs.addEventListener('click', function(e) {
    const btn = e.target.closest('.user-detail-tab');
    if (!btn) return;
    const name = btn.getAttribute('data-user-detail-tab');
    root.querySelectorAll('.user-detail-tab').forEach(function(t) { t.classList.toggle('active', t === btn); });
    root.querySelectorAll('.user-detail-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === 'userDetailPanel' + name.charAt(0).toUpperCase() + name.slice(1));
    });
  });
}

  row.style.cssText = 'display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center';
  const input = document.createElement('input');
  input.type = 'time';
  input.step = '60';
  input.value = value || '';

  remove.className = 'btn btn-outline btn-sm';

  remove.title = '删除时间点';
  remove.onclick = function() { row.remove(); };

function buildUserTaskBody(userId) {
  const kind = (document.getElementById('userTaskKind') || {}).value || 'openclaw_message';
  const scheduleType = (document.getElementById('userTaskScheduleType') || {}).value || 'once';
  const intervalMin = parseInt((document.getElementById('userTaskIntervalMinutes') || {}).value || '60', 10);
  const startAt = ((document.getElementById('userTaskStartAt') || {}).value || '').trim();
  const dailyTimes = collectUserTaskDailyTimes();
  if (scheduleType === 'daily_times' && !dailyTimes.length) throw new Error('请添加每天执行时间点');
  const body = {
    user_id: userId,
    title: ((document.getElementById('userTaskTitle') || {}).value || '').trim(),
    task_kind: kind,
    content: ((document.getElementById('userTaskContent') || {}).value || '').trim(),
    payload: {},
    schedule_type: scheduleType,
    timezone_offset_minutes: userTimezoneOffsetMinutes(),
    installation_ids: getSelectedUserTaskDevices()
  };
  if (startAt && scheduleType !== 'daily_times') body.start_at = startAt;
  if (scheduleType === 'interval') body.interval_seconds = Math.max(60, (isNaN(intervalMin) ? 60 : intervalMin) * 60);
  if (scheduleType === 'daily_times') body.daily_times = dailyTimes;
  if (kind === 'capability') {
    const raw = ((document.getElementById('userTaskPayload') || {}).value || '').trim();
    if (!raw) throw new Error('请输入能力调用 JSON');
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('能力调用 JSON 必须是对象');
    body.payload = parsed.capability_id ? parsed : { capability_id: parsed.capability || parsed.id || '', payload: parsed.payload || parsed };
    body.content = body.content || ('调用能力 ' + (body.payload.capability_id || ''));
  }
  return body;
}

async function submitUserScheduledTask(userId) {
  const btn = document.getElementById('userTaskSubmitBtn');

  try {
    body = buildUserTaskBody(userId);
  } catch(e) {
    setUserTaskMsg(e.message, true);
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = '下发中...'; }
  setUserTaskMsg('', false);
  try {
    await api('/admin/api/scheduled-tasks', { method: 'POST', body: JSON.stringify(body) });
    toast('任务已下发');
    setUserTaskMsg('任务已下发，盒子轮询后会开始执行。', false);
    await refreshUserDevicesTaskSection(userId);
  } catch(e) {
    setUserTaskMsg(e.message, true);
    toast(e.message, 'error');
  } finally {

  }
}

function formatLedgerMeta(meta) {
  if (!meta || typeof meta !== 'object') return '';
  const parts = [];
  if (meta.capability_id) parts.push(meta.capability_id);
  if (meta.model) parts.push(meta.model);
  if (meta.endpoint) parts.push(meta.endpoint);
  if (meta.pre_estimated !== undefined) parts.push('预扣 ' + meta.pre_estimated);
  if (meta.refund_credits !== undefined) parts.push('退款 ' + meta.refund_credits);
  if (meta.final !== undefined) parts.push('实际 ' + meta.final);
  return parts.join(' / ');
}

function renderLedger(data) {
  const ledger = data.ledger || [];
  const page = data.ledger_pagination || {total: ledger.length, limit: LEDGER_PAGE_SIZE, offset: currentLedgerOffset};
  const title = document.getElementById('ledgerTitle');
  if (title) {
    const start = page.total ? page.offset + 1 : 0;
    const end = Math.min(page.offset + page.limit, page.total || 0);
    title.textContent = `积分流水（${start}-${end} / 共 ${page.total || 0} 条）`;
  }
  const table = document.getElementById('ledgerTable');
  const pager = document.getElementById('ledgerPagination');
  if (!table) return;
  if (!ledger.length) {
    table.innerHTML = '<div class="empty">暂无流水记录</div>';
  } else {
    let html = `<div class="table-wrap"><table><thead><tr><th>时间</th><th>类型</th><th>变动</th><th>余额</th><th>描述</th><th>关联</th></tr></thead><tbody>`;
    for (const e of ledger) {
      const isPositive = e.delta > 0;
      const typeBadge = {
        'recharge': 'badge-green', 'refund': 'badge-green',
        'pre_deduct': 'badge-yellow', 'settle': 'badge-yellow',
        'sutui_chat': 'badge-red', 'skill_unlock': 'badge-red', 'unit_deduct': 'badge-red',
      }[e.entry_type] || 'badge-blue';
      const metaText = formatLedgerMeta(e.meta);
      const refText = [e.ref_type || '', e.ref_id || ''].filter(Boolean).join(':');
      html += `<tr>
        <td style="font-size:11px;white-space:nowrap">${e.created_at?new Date(e.created_at).toLocaleString('zh-CN'):'-'}</td>
        <td><span class="badge ${typeBadge}">${escapeHtml(e.entry_type)}</span></td>
        <td style="color:${isPositive?'var(--success)':'var(--danger)'};font-weight:600;white-space:nowrap">${isPositive?'+':''}${e.delta.toFixed(4)}</td>
        <td style="font-weight:500">${e.balance_after.toFixed(4)}</td>
        <td style="font-size:11px;color:var(--text-secondary)">${escapeHtml(e.description||'-')}</td>
        <td style="font-size:11px;color:var(--text-secondary)">${escapeHtml(metaText || refText || '-')}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
    table.innerHTML = html;
  }
  if (!pager) return;
  const total = page.total || 0;
  if (total <= (page.limit || LEDGER_PAGE_SIZE)) {
    pager.innerHTML = '';
    return;
  }
  const prevOffset = Math.max(0, page.offset - page.limit);
  const nextOffset = page.offset + page.limit;
  let html = '';
  if (page.has_prev) html += `<button class="btn btn-outline btn-sm" onclick="loadLedgerPage(${prevOffset})">上一页</button>`;
  html += `<span style="padding:6px 12px;font-size:13px;color:var(--text-secondary)">第 ${Math.floor(page.offset / page.limit) + 1}/${Math.ceil(total / page.limit)} 页</span>`;
  if (page.has_next) html += `<button class="btn btn-outline btn-sm" onclick="loadLedgerPage(${nextOffset})">下一页</button>`;
  pager.innerHTML = html;
}

async function loadLedgerPage(offset) {
  if (!currentUserId) return;

    const data = await api('/admin/api/user/' + currentUserId + '?ledger_limit=' + LEDGER_PAGE_SIZE + '&ledger_offset=' + currentLedgerOffset);

function openResetPassword() {
  if (!currentUserId) { toast('请先选择用户', 'error'); return; }
  const sub = document.getElementById('resetPwdSub');
  const card = document.getElementById('userDetailCard');
  const emailNode = card ? card.querySelector('.stat-item:nth-child(2) .value') : null;
  const tip = emailNode ? emailNode.textContent.trim() : ('用户 #' + currentUserId);
  sub.innerHTML = '将为 <strong>' + tip + '</strong> 设置新的登录密码（6～128 位）。';
  document.getElementById('resetPwdNew').value = '';
  document.getElementById('resetPwdConfirm').value = '';
  document.getElementById('resetPwdError').textContent = '';
  document.getElementById('resetPwdModal').classList.add('show');
  setTimeout(() => document.getElementById('resetPwdNew').focus(), 50);
}

function closeResetPassword() {
  document.getElementById('resetPwdModal').classList.remove('show');
}

async function doResetPassword() {
  if (!currentUserId) return;
  const np = document.getElementById('resetPwdNew').value;
  const cp = document.getElementById('resetPwdConfirm').value;
  const err = document.getElementById('resetPwdError');
  err.textContent = '';
  if (!np || np.length < 6) { err.textContent = '密码至少 6 位'; return; }
  if (np.length > 128) { err.textContent = '密码长度不能超过 128 位'; return; }
  if (np !== cp) { err.textContent = '两次输入的密码不一致'; return; }
  const btn = document.getElementById('resetPwdSubmit');
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '提交中…';
  try {
    const data = await api('/admin/api/reset-password', {
      method: 'POST',
      body: JSON.stringify({ user_id: currentUserId, new_password: np })
    });
    closeResetPassword();
    toast('密码已重置：' + (data.email || ('#' + data.user_id)));
  } catch(e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
}

async function toggleSkillVisibility(userId, pkgId, checked) {
  try {
    const body = {};
    if (checked) body.add = [pkgId]; else body.remove = [pkgId];
    await api('/admin/api/user-skill-visibility/' + userId, { method: 'POST', body: JSON.stringify(body) });
    toast(checked ? '已添加: ' + pkgId : '已移除: ' + pkgId);

}

async function toggleSkillUnlock(userId, pkgId, checked) {
  try {
    const body = {};
    if (checked) body.unlock_add = [pkgId]; else body.unlock_remove = [pkgId];
    await api('/admin/api/user-skill-visibility/' + userId, { method: 'POST', body: JSON.stringify(body) });
    toast(checked ? '已解锁 ' + pkgId : '已取消解锁 ' + pkgId);

async function loadSkillVisibility(userId) {
  const section = document.getElementById('skillVisibilitySection');
  try {
    const visData = await api('/admin/api/user-skill-visibility/' + userId);
    const visibleIds = new Set(visData.visible_ids || []);
    const unlockedIds = new Set(visData.unlocked_ids || []);
    const allPackages = visData.all_packages || [];
    if (visData.is_admin) {
      section.innerHTML = '<div style="color:var(--text-secondary);font-size:13px">该用户是管理员，默认可见所有技能。</div>';
      return;
    }
    if (!allPackages.length) {
      section.innerHTML = '<div class="empty">暂无可管理技能包</div>';
      return;
    }
    let html = '<div style="font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px">可见：控制用户技能商店能看到什么；解锁：控制付费技能/能力是否可用。</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>技能</th><th>类型/价格</th><th>能力数</th><th>可见</th><th>解锁/权限</th></tr></thead><tbody>';
    for (const pkg of allPackages) {
      const active = visibleIds.has(pkg.id);
      const unlocked = unlockedIds.has(pkg.id);
      const paid = !!(pkg.unlock_price_yuan || pkg.unlock_price_credits);
      const price = pkg.unlock_price_credits ? (pkg.unlock_price_credits + ' 积分') : (pkg.unlock_price_yuan ? (pkg.unlock_price_yuan + ' 元') : '免费/默认');
      html += '<tr>'
        + '<td><div style="font-weight:600">' + escapeHtml(pkg.name || pkg.id) + '</div><div style="font-size:11px;color:var(--text-secondary)">' + escapeHtml(pkg.id) + '</div></td>'
        + '<td><span class="badge badge-blue">' + escapeHtml(pkg.store_visibility || '-') + '</span><div style="font-size:11px;color:var(--text-secondary);margin-top:4px">' + escapeHtml(price) + '</div></td>'
        + '<td>' + (pkg.capabilities_count || 0) + '</td>'
        + '<td><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" ' + (active ? 'checked' : '') + ' onchange="toggleSkillVisibility(' + userId + ',\'' + escapeHtml(pkg.id) + '\',this.checked)"> <span>' + (active ? '可见' : '隐藏') + '</span></label></td>'
        + '<td><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" ' + (unlocked ? 'checked' : '') + ' onchange="toggleSkillUnlock(' + userId + ',\'' + escapeHtml(pkg.id) + '\',this.checked)"> <span>' + (paid ? (unlocked ? '已解锁' : '未解锁') : (unlocked ? '已授权' : '授权')) + '</span></label></td>'
        + '</tr>';
    }
    html += '</tbody></table></div>';
    section.innerHTML = html;
  } catch(e) {
    section.innerHTML = '<div class="empty" style="color:var(--danger)">' + e.message + '</div>';
  }
}

let statsCache = null;
let _statsLoading = false;
async function loadStats() {
  if (statsCache && Date.now() - statsCache._ts < 30000) { renderStats(statsCache); return; }
  if (_statsLoading) return;
  _statsLoading = true;
  document.getElementById('statsOverview').innerHTML = '<div class="empty">加载中…</div>';
  try {
    const data = await api('/admin/api/stats?days=30');
    data._ts = Date.now();
    statsCache = data;
    renderStats(data);
  } catch(e) {
    toast(e.message, 'error');
    document.getElementById('statsOverview').innerHTML = '<div class="empty" style="cursor:pointer" onclick="statsCache=null;loadStats()">加载失败，点击重试</div>';
  } finally {
    _statsLoading = false;
  }
}

  const s = data.summary || {};
  document.getElementById('commissionOverview').innerHTML = `
    ${statCard('累计分润', '¥' + Number(s.total_commission_yuan || 0).toFixed(2), '')}
    ${statCard('分润记录', s.total || 0, '笔')}
    ${statCard('代理级别', AGENT_LEVEL === 2 ? '二级代理' : '一级代理', '')}
  `;
  const items = data.items || [];
  const table = document.getElementById('commissionTable');
  if (!items.length) {
    table.innerHTML = '<div class="empty">暂无成功充值分润记录</div>';
    document.getElementById('commissionPagination').innerHTML = '';
    return;
  }
  let html = '<div class="table-wrap"><table><thead><tr><th>时间</th><th>充值用户</th><th>下级关系</th><th>充值金额</th><th>比例</th><th>本笔收入</th><th>订单号</th></tr></thead><tbody>';
  items.forEach(function(item) {
    const when = item.paid_at || item.created_at;
    html += '<tr>'
      + '<td style="font-size:12px;color:var(--text-secondary)">' + (when ? new Date(when).toLocaleString('zh-CN') : '-') + '</td>'
      + '<td>' + escapeHtml(item.source_account || '-') + '</td>'
      + '<td><span class="badge ' + (item.relation_level === 2 ? 'badge-purple' : 'badge-blue') + '">' + escapeHtml(item.relation_label || '-') + '</span></td>'
      + '<td>¥' + Number(item.base_amount_yuan || 0).toFixed(2) + '</td>'
      + '<td>' + Number(item.rate_percent || 0).toFixed(0) + '%</td>'
      + '<td class="credits-value">¥' + Number(item.commission_yuan || 0).toFixed(2) + '</td>'
      + '<td style="font-size:11px;color:var(--text-secondary)">' + escapeHtml(item.out_trade_no || '-') + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  table.innerHTML = html;
  const p = data.pagination || {};
  let pageHtml = '';
  if (p.has_prev) pageHtml += '<button class="btn btn-outline btn-sm" onclick="loadCommissions(' + Math.max(0, commissionOffset - COMMISSION_PAGE_SIZE) + ')">上一页</button>';
  pageHtml += '<span style="padding:6px 12px;font-size:13px;color:var(--text-secondary)">共 ' + (p.total || 0) + ' 笔</span>';
  if (p.has_next) pageHtml += '<button class="btn btn-outline btn-sm" onclick="loadCommissions(' + (commissionOffset + COMMISSION_PAGE_SIZE) + ')">下一页</button>';
  document.getElementById('commissionPagination').innerHTML = pageHtml;
}

function statCard(label, value, unit) {
  return `<div class="stats-card"><div class="sc-label">${label}</div><div class="sc-value">${value}</div>${unit ? '<div class="sc-sub">' + unit + '</div>' : ''}</div>`;
}

function renderBarChart(elId, items, valueKey, color) {
  const el = document.getElementById(elId);
  if (!items || !items.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  const max = Math.max(...items.map(i => i[valueKey] || 0), 1);
  const recent = items.slice(-10).reverse();
  let html = '';
  for (const item of recent) {
    const v = item[valueKey] || 0;
    const pct = Math.max((v / max) * 100, 1);
    const dateLabel = (item.date || '').slice(5);
    const cls = color === 'primary' ? '' : ' ' + color;
    html += `<div class="chart-bar-row">
      <div class="chart-bar-label">${dateLabel}</div>
      <div style="flex:1;background:var(--bg);border-radius:4px;overflow:hidden"><div class="chart-bar${cls}" style="width:${pct}%"></div></div>
      <div class="chart-bar-value">${valueKey === 'amount' ? v.toFixed(1) : v}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderCapRanking(items) {
  const el = document.getElementById('chartCapRanking');
  if (!items || !items.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  let html = '<table class="rank-table">';
  items.forEach((r, i) => {
    html += `<tr><td class="rank-num">${i + 1}</td><td style="font-weight:500">${r.capability_id}</td><td>${r.calls} 次</td><td style="color:var(--primary);font-weight:600">${r.credits.toFixed(1)}</td></tr>`;
  });
  html += '</table>';
  el.innerHTML = html;
}

function renderTopConsumers(items) {
  const el = document.getElementById('chartTopConsumers');
  if (!items || !items.length) { el.innerHTML = '<div class="empty">暂无数据</div>'; return; }
  const max = Math.max(...items.map(i => i.consumed), 1);
  let html = '';
  items.forEach((r, i) => {
    const pct = Math.max((r.consumed / max) * 100, 1);
    const email = r.email.replace(/@sms\.lobster\.local$/, '');
    html += `<div class="chart-bar-row">
      <div class="chart-bar-label" style="width:120px" title="${r.email}"><span class="rank-num">${i + 1}</span> ${email}</div>
      <div style="flex:1;background:var(--bg);border-radius:4px;overflow:hidden"><div class="chart-bar yellow" style="width:${pct}%"></div></div>
      <div class="chart-bar-value">${r.consumed.toFixed(1)}</div>
    </div>`;
  });
  el.innerHTML = html;
}
</script>
</body>
